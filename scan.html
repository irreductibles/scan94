<style>
  html,body{margin:0;padding:0;background:#0a0c10;font-family:'Inter',-apple-system,system-ui,sans-serif;height:100%;overflow:hidden;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased}

  /* Stage: fake bezel for desktop preview only */
  #stage{height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 800px at 50% 30%,#22262e 0%,#0a0c10 100%)}
  .phone{position:relative;width:390px;height:780px;border-radius:48px;background:#000;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 2px #1a1d24,0 0 0 6px #2a2f38}

  .notch{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:96px;height:30px;background:#000;border-radius:20px;z-index:50}

  .status{position:absolute;top:0;left:0;right:0;padding:14px 32px 0;display:flex;justify-content:space-between;color:#fff;font-size:14px;font-weight:600;z-index:40;font-variant-numeric:tabular-nums}

    #stage{background:#0a0c10;align-items:stretch;justify-content:stretch}
    .phone{width:100%;height:100vh;height:100dvh;border-radius:0;background:#0a0c10;padding:0;box-shadow:none}
    .screen{border-radius:0;height:100%}
    .notch,.home-ind,.status{display:none}
    .app{top:env(safe-area-inset-top);left:0;right:0;bottom:0}
  }
  /* PC mode: pointer:fine + écran large → workspace plein écran */
  body.pc-mode #stage{background:#0a0c10;align-items:stretch;justify-content:stretch;padding:0}
  body.pc-mode .phone{width:100vw;height:100vh;border-radius:0;background:#0a0c10;padding:0;box-shadow:none}
  body.pc-mode .screen{border-radius:0;height:100%}
  body.pc-mode .notch,body.pc-mode .home-ind,body.pc-mode .status{display:none}

  body.pc-mode ::-webkit-scrollbar{display:initial;width:8px;height:8px}
  body.pc-mode ::-webkit-scrollbar-track{background:#0a0c10}
  body.pc-mode ::-webkit-scrollbar-thumb{background:#252a35;border-radius:99px}
  body.pc-mode ::-webkit-scrollbar-thumb:hover{background:#3a3f4d}
  body.pc-mode *{scrollbar-width:thin;scrollbar-color:#252a35 #0a0c10}
  button{font-family:inherit;cursor:pointer}
  /* Animations */
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  @keyframes scanline{0%{top:10%}50%{top:85%}100%{top:10%}}
  @keyframes fadeFlash{0%{opacity:1}100%{opacity:0}}
  @keyframes scanFlash{0%{background:rgba(251,146,60,.0)}30%{background:rgba(251,146,60,.18)}100%{background:rgba(251,146,60,0)}}
  .scan-flash{animation:scanFlash .35s ease-out}
  @keyframes pulseDot{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}
  .sheet-bg{animation:fade .2s ease}
  .sheet{animation:slideUp .25s cubic-bezier(.2,.8,.3,1)}
  .pop{animation:pop .15s ease}
  ::-webkit-scrollbar{display:none}
  *{scrollbar-width:none}

<script>
// Global crash catcher — avant React/Babel
window.onerror = function(msg, src, line, col, err) {
  document.body.innerHTML = '<div style="padding:30px;color:#f87171;background:#0b1220;font-family:monospace;min-height:100dvh">'
    + '<h2 style="font-weight:900;margin-bottom:12px">CRASH</h2>'
    + '<pre style="font-size:12px;white-space:pre-wrap;color:#fca5a5">' + msg + '\n' + (src||'') + ':' + line + ':' + col + '\n' + (err?.stack||'') + '</pre>'
    + '<button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#60a5fa;color:#000;border:none;border-radius:8px;font-weight:700">Recharger</button></div>';
};
window.addEventListener('unhandledrejection', function(e) {
  document.body.innerHTML = '<div style="padding:30px;color:#f87171;background:#0b1220;font-family:monospace;min-height:100dvh">'
    + '<h2 style="font-weight:900;margin-bottom:12px">CRASH (Promise)</h2>'
    + '<pre style="font-size:12px;white-space:pre-wrap;color:#fca5a5">' + (e.reason?.stack || e.reason || 'unknown') + '</pre>'
    + '<button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#60a5fa;color:#000;border:none;border-radius:8px;font-weight:700">Recharger</button></div>';
});
</script>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// Agence dérivée du nom de fichier : "Prisme Scan C - AG22.html" → AG22
const AGENCY = (() => {
  try {
    const m = decodeURIComponent(window.location.pathname).match(/AG\d+/i);
    return m ? m[0].toUpperCase() : '—';
  } catch (e) { return '—'; }
})();
// Config collègue (chargé depuis config.json si dispo)
let SCAN_CONFIG = {};
fetch('config.json',{cache:'no-cache'}).then(r=>r.ok?r.json():{}).catch(()=>({})).then(c=>{
  SCAN_CONFIG=c;
  if (c.retour===false) { ARTICLES = loadEngineData(window._rawEngineData||ENGINE_DATA); _rebuildArtIndex(); document.dispatchEvent(new Event('prisme-data')); }
});

fetch('js/catalogue-marques.json', { cache: 'no-cache' }).then(r => r.ok ? r.json() : null).then(data => {
  if (!data) return;
  CATALOGUE = data;
  if (data.E && typeof data.E === 'object') {
    if (!window._eanMap) window._eanMap = new Map();
    for (const [ean, code] of Object.entries(data.E)) {
      if (!window._eanMap.has(ean)) window._eanMap.set(ean, _normCode(code));
    }
    console.log('[Prisme] Catalogue · ' + Object.keys(data.A || {}).length + ' articles · EAN ' + window._eanMap.size);
  }
  window.dispatchEvent(new Event('prisme-catalogue'));
}).catch(() => {});

const CTX = {
  greeting: AGENCY,
  agency: AGENCY,
  refs: '12 416',
  day: 'Vendredi',
  time: '14:32',
  scansToday: 12,
};

// ── Theme ─────────────────────────────────────────────────────
const T = {
  bg: '#0a0c10', card: '#13171f', card2: '#1a1f29', border: '#252a35',
  t1: '#f4f6fa', t2: '#9aa3b2', t3: '#5b6473', accent: '#fb923c',
};
const VC = {
  rupture:  { bg:'#3a1518', fg:'#fca5a5', edge:'#ef4444', label:'Rupture' },
  sousmin:  { bg:'#3a2a14', fg:'#fbbf24', edge:'#f59e0b', label:'Sous min' },
  ok:       { bg:'#16301f', fg:'#86efac', edge:'#22c55e', label:'OK' },
  surstock: { bg:'#2c1f4a', fg:'#c4b5fd', edge:'#a78bfa', label:'Sur-stock' },
};

// ── Data (engine-compat) ──────────────────────────────────────
// loadEngineData(engine) consomme la VRAIE shape produite par scan.js
// (cf. uploads/scan.js · _SCAN_FIELDS / finalData) :
//   { code, libelle, famille, sousFamille, marque?, emplacement, statut,
//     stockActuel, prixMoyenReseau, txMargeReseau,
//     ancienMin, ancienMax, nouveauMin, nouveauMax, couvertureJours,
//     _sqClassif, _sqVerdict, _sqRole, _refFourn, _vitesseReseau, _fallbackERP,
//     W, V, abcClass, fmrClass, matriceVerdict, prixUnitaire, _coutUnitaire }
//
// Mapping vers la shape consommée par l'UI :
//   libelle→lib · famille(+sousFamille)→fam · emplacement→empl
//   stockActuel→stock · prixMoyenReseau→prix · txMargeReseau→marge
//   nouveauMin→min · nouveauMax→max · ancienMin/ancienMax→erpMin/erpMax
//   couvertureJours→couv · _sqClassif→sq (label) · _refFourn→refFourn
//   verdict, primary, secondary = dérivés (cf. _verdict, _primary, _secondary)

// Mock = échantillon en shape MOTEUR (pas en shape UI). Sert quand IDB est vide.
const ENGINE_DATA = [
  { code:'264821', libelle:'Foret béton SDS-Plus Ø10 L260', marque:'Bosch Pro', famille:'Outillage électroportatif', sousFamille:null, _refFourn:'2608685976', emplacement:'B12-C3', stockActuel:8, prixMoyenReseau:14.90, txMargeReseau:38, nouveauMin:2, nouveauMax:4, ancienMin:2, ancienMax:6, couvertureJours:92, statut:'Actif', _sqClassif:'socle' },
  { code:'108342', libelle:'Vis bois Spax Wirox 5×60 T25 (×200)', marque:'Spax', famille:'Visserie', sousFamille:'Bois', _refFourn:'SP-0191040500605', emplacement:'A04-B1', stockActuel:0, prixMoyenReseau:18.20, txMargeReseau:42, nouveauMin:6, nouveauMax:18, ancienMin:6, ancienMax:18, couvertureJours:0, statut:'Actif', _sqClassif:'a_implanter' },
  { code:'512004', libelle:'Robinet d\u2019arrêt droit MF Ø15', marque:'Comap', famille:'Plomberie', sousFamille:'Robinetterie', _refFourn:'7050015B', emplacement:'D08-A2', stockActuel:3, prixMoyenReseau:6.40, txMargeReseau:31, nouveauMin:2, nouveauMax:5, ancienMin:2, ancienMax:5, couvertureJours:24, statut:'Actif', _sqClassif:'socle' },
  { code:'264820', libelle:'Foret béton SDS-Plus Ø8 L160', marque:'Bosch Pro', famille:'Outillage électroportatif', sousFamille:null, _refFourn:null, emplacement:'B12-C2', stockActuel:4, prixMoyenReseau:11.50, txMargeReseau:36, nouveauMin:2, nouveauMax:4, ancienMin:2, ancienMax:4, couvertureJours:32, statut:'Actif', _sqClassif:'socle' },
  { code:'264823', libelle:'Foret béton SDS-Plus Ø12 L300', marque:'Bosch Pro', famille:'Outillage électroportatif', sousFamille:null, _refFourn:null, emplacement:'B12-C4', stockActuel:1, prixMoyenReseau:18.60, txMargeReseau:35, nouveauMin:2, nouveauMax:4, ancienMin:2, ancienMax:4, couvertureJours:14, statut:'Actif', _sqClassif:'surveiller' },
  { code:'264822', libelle:'Foret béton SDS-Plus Ø10 L160', marque:'Bosch Pro', famille:'Outillage électroportatif', sousFamille:null, _refFourn:null, emplacement:'B12-C3', stockActuel:0, prixMoyenReseau:13.20, txMargeReseau:37, nouveauMin:2, nouveauMax:4, ancienMin:2, ancienMax:4, couvertureJours:0, statut:'Actif', _sqClassif:'socle' },
  { code:'264850', libelle:'Coffret 7 forets béton SDS+', marque:'Bosch Pro', famille:'Outillage électroportatif', sousFamille:null, _refFourn:null, emplacement:'B12-A1', stockActuel:2, prixMoyenReseau:42.80, txMargeReseau:29, nouveauMin:1, nouveauMax:3, ancienMin:1, ancienMax:3, couvertureJours:48, statut:'Actif', _sqClassif:'socle' },
];

const SQ_LABEL = { socle:'Socle', surveiller:'Surveiller', a_implanter:'À implanter', dormant:'Dormant' };

// Verdict stock — proxy léger de _verdict() côté scan.js (sans W/vitesse pour l'instant).
function _verdict(stock, min, max) {
  if (stock < 0) return 'rupture';
  if (stock === 0 && min > 0) return 'rupture';
  if (min > 0 && stock < min) return 'sousmin';
  if (max > 0 && stock > max) return 'surstock';
  return 'ok';
}
function _primary(verdict, stock, min, max, statut) {
  const finDeVie = /fin de (s[ée]rie|stock|catalogue)/i.test(statut||'');
  // Stock négatif → corriger le stock ERP, vider MIN/MAX
  if (stock < 0) return { kind:'corriger_stock', label:'Corriger stock', qty: 0, sub:`Stock ERP : ${stock} · vérifier le rayon` };
  // Fin de série → ne pas commander, retourner si stock > 0
  if (finDeVie && stock > 0) return { kind:'retour', label:'Retour centrale', qty: stock, sub:`Fin de série · solder le stock` };
  if (finDeVie) return null; // fin de série + stock 0 → rien à faire
  if (verdict === 'rupture')  return { kind:'commander', label:'Commander', qty: Math.max(min, 1), sub:`Stock ${stock} < MIN ${min}` };
  if (verdict === 'sousmin')  return { kind:'commander', label:'Commander', qty: min - stock,     sub:`Stock ${stock} < MIN ${min}` };
  if (verdict === 'surstock') return { kind:'retour', label:'Retour centrale', qty: stock - max, sub:`${stock - max} pcs au-dessus du MAX` };
  return null;
}
function _secondary(it) {
  const sec = [];
  if (SCAN_CONFIG.retour === false) return sec;
  const min = it.nouveauMin || 0, max = it.nouveauMax || 0;
  const eMin = it.ancienMin || 0, eMax = it.ancienMax || 0;
  if ((min > 0 || max > 0) && (eMin !== min || eMax !== max)) {
    sec.push({ kind:'erp', label:'Ajuster MIN/MAX', sub:`${eMin}/${eMax} → ${min}/${max}` });
  }
  return sec;
}

function loadEngineData(engine) {
  if (!Array.isArray(engine)) return [];
  return engine.map(it => {
    const stock = it.stockActuel ?? 0;
    const min   = it.ancienMin ?? 0;
    const max   = it.ancienMax ?? 0;
    const eMin  = it.ancienMin    ?? 0;
    const eMax  = it.ancienMax    ?? 0;
    const verdict = _verdict(stock, min, max);
    const fam = it.sousFamille ? `${it.famille || ''} › ${it.sousFamille}` : (it.famille || '—');
    return {
      code:    it.code,
      lib:     it.libelle || '—',
      marque:  it.marque || '',
      fam,
      empl:    it.emplacement || '—',
      stock,
      prix:    it.prixMoyenReseau ?? null,
      marge:   it.txMargeReseau   ?? null,
      min, max, erpMin: eMin, erpMax: eMax,
      refFourn: it._refFourn || null,
      couv:    (it.couvertureJours != null && it.couvertureJours < 9999) ? it.couvertureJours : 0,
      statut:  it.statut || 'Actif',
      verdict,
      sq:      SQ_LABEL[it._sqClassif] || (it._sqVerdict || 'Socle'),
      primary: _primary(verdict, stock, min, max, it.statut),
      secondary: _secondary(it),
      _raw:    it, // garde l'original sous le coude pour passes futures (W, vitesse, ABC…)
    };
  });
}

// Mutable on purpose : remplacé par hydrateFromIDB() au boot quand dispo.
let ARTICLES = [];
let _artByCode = new Map(); // code → article (O(1) lookup)
let _artByRef  = new Map(); // refFourn → article (O(1) lookup)
function _rebuildArtIndex() {
  _artByCode = new Map();
  _artByRef  = new Map();
  for (const a of ARTICLES) {
    _artByCode.set(a.code, a);
    if (a.refFourn) _artByRef.set(a.refFourn, a);
  }
}
let DATA_SOURCE = 'loading'; // 'loading' | 'mock' | 'idb'
let CATALOGUE = null; // catalogue-marques.json brut {M,F,S,A,E,R}

function _normCode(raw) {
  const s = String(raw || '').replace(/\D/g, '');
  return s ? s.replace(/^0+/, '').padStart(6, '0') : '';
}

function _catalogHas(code) {
  const c = _normCode(code);
  return !!(c && CATALOGUE?.A?.[c]);
}

function _catalogArticle(code) {
  const c = _normCode(code);
  const entry = CATALOGUE?.A?.[c];
  if (!entry) return null;
  const fam = CATALOGUE.F?.[entry[1]];
  const famLabel = fam ? [fam[1], fam[3]].filter(Boolean).join(' › ') : 'Catalogue Legallais';
  return {
    code: c,
    lib: entry[2] || '—',
    marque: CATALOGUE.M?.[entry[0]] || '',
    fam: famLabel || 'Catalogue Legallais',
    empl: 'Hors agence',
    stock: 0,
    prix: null,
    marge: null,
    min: 0,
    max: 0,
    erpMin: 0,
    erpMax: 0,
    refFourn: CATALOGUE.R?.[c] || null,
    couv: 0,
    statut: CATALOGUE.S?.[entry[3]] || 'Catalogue',
    verdict: 'ok',
    sq: 'Hors agence',
    primary: null,
    secondary: [],
    catalogOnly: true,
  };
}

// ── Associations EAN custom ─────────────────────────────────
// Map<ean, articleCode> — persisté en localStorage
const _customEanMap = new Map();
try {
  const raw = localStorage.getItem('prisme_custom_ean');
  if (raw) { for (const [k,v] of Object.entries(JSON.parse(raw))) _customEanMap.set(k,v); }
} catch(e){}
function _saveCustomEan() {
  try { localStorage.setItem('prisme_custom_ean', JSON.stringify(Object.fromEntries(_customEanMap))); } catch(e){}
}
function addCustomEan(ean, code) { _customEanMap.set(ean, code); _saveCustomEan(); }
function removeCustomEan(ean) { _customEanMap.delete(ean); _saveCustomEan(); }
function getCustomEansForCode(code) { return [..._customEanMap.entries()].filter(([,c])=>c===code).map(([ean])=>ean); }

// ── IDB hydrate ──────────────────────────────────────────────
// Lit IndexedDB PRISME (clé 'scan' prioritaire, sinon 'current') comme scan.js.
// Si trouvé : remplace ARTICLES et notifie l'app (custom event 'prisme-data').
function hydrateFromIDB() {
  if (typeof indexedDB === 'undefined') { ARTICLES = loadEngineData(ENGINE_DATA); _rebuildArtIndex(); DATA_SOURCE = 'mock'; return; }
  let req;
  try { req = indexedDB.open('PRISME', 2); } catch (e) { return; }
  req.onerror = () => {};
  req.onupgradeneeded = () => {
    try {
      const db = req.result;
      if (!db.objectStoreNames.contains('session')) db.createObjectStore('session');
    } catch (e) {}
  };
  req.onsuccess = () => {
    const db = req.result;
    if (!db.objectStoreNames.contains('session')) { ARTICLES = loadEngineData(ENGINE_DATA); _rebuildArtIndex(); DATA_SOURCE = 'mock'; return; }
    const tx = db.transaction('session', 'readonly');
    const store = tx.objectStore('session');
    const grab = (key) => new Promise(res => {
      const r = store.get(key); r.onsuccess = () => res(r.result); r.onerror = () => res(null);
    });
    Promise.all([grab('scan'), grab('current')]).then(([scan, current]) => {
      // Charger la table EAN si disponible
      const eanData = scan?.ean || current?.ean;
      if (eanData && typeof eanData === 'object') {
        window._eanMap = new Map(Object.entries(eanData));
        console.log('[Prisme] EAN map · ' + window._eanMap.size + ' entrées');
      }
      const hasLive = current?.finalData?.length > 0;
      // Si session PRISME live → la préférer
      if (hasLive) {
        ARTICLES = loadEngineData(current.finalData); _rebuildArtIndex();
        DATA_SOURCE = 'idb';
        if (current.selectedMyStore) { CTX.agency = current.selectedMyStore; CTX.greeting = CTX.agency; }
        console.log('[Prisme] IDB session live · ' + ARTICLES.length + ' articles');
        window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'idb' } }));
        return;
      }
      // Sinon essayer le JSON distant
      if (!hasLive) {
        _fetchScanJson().then(ok => {
          if (ok) return;
          // Fallback IDB scan
          const rows = (scan?.articles?.length ? scan.articles
                       : scan?.finalData?.length ? scan.finalData
                       : null);
          if (!rows) {
            console.log('[Prisme] IDB vide → fallback mock');
            ARTICLES = loadEngineData(ENGINE_DATA); _rebuildArtIndex(); DATA_SOURCE = 'mock';
            window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'mock' } }));
            return;
          }
          ARTICLES = loadEngineData(rows); _rebuildArtIndex();
          DATA_SOURCE = 'idb';
          console.log('[Prisme] IDB scan · ' + ARTICLES.length + ' articles');
          window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'idb' } }));
        });
      }
    });
  };
}

function _fetchScanJson() {
  return fetch('data/index.json', { cache: 'no-cache' }).then(r => r.ok ? r.json() : null).then(files => {
    if (!files) return false;
    const f = files.find(n => n.startsWith('prisme-scan-') && n.endsWith('.json'));
    if (!f) return false;
    return fetch('data/' + f, { cache: 'no-cache' }).then(r => r.ok ? r.json() : null).then(data => {
      const rows = data?.articles || data?.finalData;
      if (!rows?.length) return false;
      if (data?.ean && typeof data.ean === 'object') {
        window._eanMap = new Map(Object.entries(data.ean));
        console.log('[Prisme] EAN map JSON · ' + window._eanMap.size + ' entrées');
      }
      ARTICLES = loadEngineData(rows); _rebuildArtIndex();
      DATA_SOURCE = 'json';
      const m = f.match(/prisme-scan-(.+)\.json/);
      if (m) CTX.agency = m[1];
      CTX.greeting = CTX.agency;
      console.log('[Prisme] JSON · ' + ARTICLES.length + ' articles depuis data/' + f);
      window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'json' } }));
      return true;
    });
  }).catch(() => false);
}

hydrateFromIDB();
const findArt = (q) => {
  const c = q.replace(/\D/g,'');
  if (_artByCode.get(c)) return c;
  if (_catalogHas(c)) return _normCode(c);
  // Ref fournisseur
  const byRef = _artByRef.get(q) || _artByRef.get(q.toUpperCase());
  if (byRef) return byRef.code;
  // Custom EAN
  if (_customEanMap.has(c)) {
    const m = _normCode(_customEanMap.get(c));
    if (_artByCode.get(m) || _catalogHas(m)) return m;
  }
  // IDB EAN map
  if (window._eanMap) {
    const m = _normCode(window._eanMap.get(c));
    if (_artByCode.get(m) || _catalogHas(m)) return m;
  }
  return null;
};

// ── Haptic / Beep (iOS n'a pas navigator.vibrate) ────────────
let _audioCtx = null;
function _beep(freq=1200, ms=120) {
  try { navigator.vibrate?.(ms); } catch(e){}
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'square';
    gain.gain.value = 0.15;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + ms / 1000);
    osc.stop(_audioCtx.currentTime + ms / 1000);
  } catch(e){}
}
function _beepError() { _beep(440, 120); setTimeout(()=>_beep(330, 120), 140); }

class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  render() {
    if (this.state.err) return React.createElement('div', {style:{padding:40,color:'#f87171',background:'#0b1220',minHeight:'100dvh'}},
      React.createElement('h2',{style:{fontWeight:900,marginBottom:12}},'Erreur — appli crashée'),
      React.createElement('pre',{style:{fontSize:12,whiteSpace:'pre-wrap',color:'#fca5a5'}}, String(this.state.err?.stack||this.state.err)),
      React.createElement('button',{onClick:()=>this.setState({err:null}),style:{marginTop:16,padding:'10px 20px',background:'#60a5fa',color:'#000',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}},'Relancer')
    );
    return this.props.children;
  }
}

        if (!_artByCode.get(c) && !_catalogHas(c)) { setSheet({type:'unknown', code:c}); return; }
        const fromInv = invScanFromInvRef.current; invScanFromInvRef.current = false;
        if (fromInv && invMode && invZone && !INV_CODES.includes(c) && _artByCode.get(c)) {
          const a = _artByCode.get(c);
          setInvExtras(e => ({...e, [c]: (e[c] ?? a.stock)}));
        }
        openArticle(c);
      }} onBatch={(items)=>{
        setSheet(null);
        if (items.length === 0) return;
        // Ajouter tous les articles scannés (pas seulement ceux avec action primaire)
        setActions(prev => {
          const next = {...prev};
          for (const d of items) {
            const a = _artByCode.get(d.code);
            if (!a) continue;
            // Si déjà en attente pour cet article, skip
            if (next[d.code]?.some(x=>x.status==='pending')) continue;
            const id = 'a' + Math.random().toString(36).slice(2,8);
            const label = a.primary ? a.primary.label + (a.primary.qty ? ` x${a.primary.qty}` : '') : 'A verifier';
            const kind = a.primary ? a.primary.kind : 'check';
            next[d.code] = [...(next[d.code]||[]), { id, kind, label, dest:'', eta:'', ts:Date.now(), status:'pending' }];
          }
          return next;
        });
        showToast(`${items.length} article${items.length>1?'s':''} ajouté${items.length>1?'s':''} aux actions`);
        setSheet('todo');
      }} onUnknown={(code)=>setSheet({type:'unknown', code})} />}
      {sheet === 'ean' && <EanSheet onClose={()=>setSheet(null)} onPick={(c)=>{ setSheet(null); openArticle(c); }} />}
      {sheet?.type === 'unknown' && <UnknownSheet code={sheet.code} onClose={()=>setSheet(null)} onRetry={()=>setSheet('camera')} onAssoc={(artCode)=>{ setSheet(null); showToast(`EAN associé à ${artCode}`); openArticle(artCode); }} />}
      {sheet === 'todo' && <JournalSheet
        onClose={()=>setSheet(null)}
        actions={actions}
        onPick={(c)=>{ setSheet(null); openArticle(c); }}
        onUndo={undoAction}
        onValidate={validateAction}
        onPush={()=>{
          setActions(prev => {
            const next = {};
            Object.keys(prev).forEach(c => {
              next[c] = prev[c].map(x => x.status==='pending' ? {...x, status:'validee'} : x);
            });
            return next;
          });
          showToast('✓ Toutes les actions synchronisées');
        }}
        onPurge={()=>{
          setActions({});
          setSheet(null);
          showToast('Journal purgé');
        }}
        onLabels={()=>setSheet('labels')}
      />}

      {sheet === 'labels' && <LabelsSheet
        onClose={()=>setSheet(null)}
        actions={actions}
        onMarkPrinted={(code, id)=>{
          setActions(prev => {
            if (!prev[code]) return prev;
            const list = prev[code].map(x => x.id === id ? {...x, status:'validee'} : x);
            return {...prev, [code]: list};
          });
          showToast('Étiquette marquée imprimée');
        }}
        onMarkAllPrinted={()=>{
          setActions(prev => {
            const next = {};
            Object.keys(prev).forEach(c => {
              next[c] = prev[c].map(x => x.kind==='etiquette' && x.status==='pending' ? {...x, status:'validee'} : x);
            });
            return next;
          });
          showToast('Toutes les étiquettes marquées imprimées');
        }}
      />}

      {toast && <Toast msg={toast} />}
    </>
  );
}

  const verdictPrio = {rupture:0, sousmin:1, surstock:2, ok:3};
  const todos = ARTICLES.filter(a => a.primary && !(treatedCodes[a.code]?.length > 0)).sort((a,b)=>{
    const pa = a.stock < 0 ? -1 : (verdictPrio[a.verdict]??9);
    const pb = b.stock < 0 ? -1 : (verdictPrio[b.verdict]??9);
    return pa - pb;
  });
  const totalQty = todos.reduce((s,a)=>s+(a.primary?.qty||0),0);
  const ruptures = todos.filter(a=>a.verdict==='rupture').length;

  // Regrouper par emplacement (zone = partie avant le tiret)
  const emplMap = {};
  todos.forEach(a => {
    const zone = (a.empl||'—').split('-')[0] || '—';
    if (!emplMap[zone]) emplMap[zone] = {neg:0,rupt:0,sousmin:0,surstock:0,total:0,articles:[]};
    const e = emplMap[zone];
    e.total++;
    if (a.stock < 0) e.neg++;
    if (a.verdict === 'rupture') e.rupt++;
    else if (a.verdict === 'sousmin') e.sousmin++;
    else if (a.verdict === 'surstock') e.surstock++;
    e.articles.push(a);
  });
  const emplList = Object.entries(emplMap).sort((a,b) => {
    const sa = a[1].neg*1000 + a[1].rupt*100 + a[1].sousmin*10 + a[1].surstock;
    const sb = b[1].neg*1000 + b[1].rupt*100 + b[1].sousmin*10 + b[1].surstock;
    return sb - sa;

    <>
      <TopBar onMenu={onMenu} sub={`${t.agency} · ${t.day} ${t.time}${DATA_SOURCE==='idb'?'':DATA_SOURCE==='loading'?' · chargement…':' · '+DATA_SOURCE}`} />

            </div>
            <span style={{fontSize:36,fontWeight:900,color:'#fca5a5',letterSpacing:-2}} className="tn">{todos.length}</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
            {emplList.slice(0,8).map(([zone, e]) => (
              <button key={zone} onClick={()=>onArticle(e.articles[0].code, zone)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:T.card,borderRadius:12,border:`1px solid ${T.border}`,borderLeft:`3px solid ${e.neg>0?'#f87171':e.rupt>0?'#ef4444':e.sousmin>0?'#fbbf24':'#a78bfa'}`,cursor:'pointer',color:T.t1,textAlign:'left'}}>
                <div style={{minWidth:44,textAlign:'center'}}>

                </div>
                <div style={{flex:1,display:'flex',gap:6,flexWrap:'wrap'}}>
                  {e.neg > 0 && <span style={{padding:'2px 7px',borderRadius:99,background:'rgba(248,113,113,.15)',color:'#f87171',fontSize:10,fontWeight:800}}>{e.neg} nég</span>}
                  {e.rupt > 0 && <span style={{padding:'2px 7px',borderRadius:99,background:'rgba(239,68,68,.15)',color:'#fca5a5',fontSize:10,fontWeight:800}}>{e.rupt} rupt</span>}
                  {e.sousmin > 0 && <span style={{padding:'2px 7px',borderRadius:99,background:'rgba(251,191,36,.12)',color:'#fbbf24',fontSize:10,fontWeight:800}}>{e.sousmin} &lt;min</span>}

          {recents.slice(0,4).map(c => {

      </div>
    </>
  );
  const v = VC[a.verdict];

  if (a.catalogOnly) {
    return (
      <>
        <TopBar title={a.code} sub="Article hors agence" back onBack={onBack} onMenu={()=>{}} />
        <div style={{flex:1,padding:'18px 14px',overflow:'auto'}}>
          <div style={{padding:'18px 16px',background:T.card,borderRadius:16,border:`1px solid ${T.border}`}}>
            <div style={{fontSize:10,color:T.accent,fontWeight:900,letterSpacing:1.1,textTransform:'uppercase'}}>Catalogue Legallais</div>
            <div style={{fontSize:24,fontWeight:900,color:T.t1,marginTop:8,letterSpacing:.5}} className="tn">{a.code}</div>
            <div style={{fontSize:15,fontWeight:800,color:T.t1,marginTop:10,lineHeight:1.35}}>{a.lib}</div>
            <div style={{fontSize:12,color:T.t2,marginTop:8,lineHeight:1.5}}>{a.marque}{a.marque && a.fam ? ' · ' : ''}{a.fam}</div>
            <div style={{marginTop:14,padding:'12px',borderRadius:12,background:'rgba(251,146,60,.10)',border:'1px solid rgba(251,146,60,.28)'}}>
              <div style={{fontSize:12,fontWeight:800,color:T.accent}}>Article non référencé dans cette agence</div>
              <div style={{fontSize:11,color:T.t2,marginTop:4,lineHeight:1.45}}>Le code-barres existe au catalogue, mais pas dans la base stock locale chargée.</div>
            </div>
            <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div style={{padding:'10px',background:'#0a0c10',borderRadius:10}}>
                <div style={{fontSize:8,color:T.t3,textTransform:'uppercase',fontWeight:900,letterSpacing:.6}}>Statut</div>
                <div style={{fontSize:12,color:T.t1,fontWeight:800,marginTop:3}}>{a.statut}</div>
              </div>
              <div style={{padding:'10px',background:'#0a0c10',borderRadius:10}}>
                <div style={{fontSize:8,color:T.t3,textTransform:'uppercase',fontWeight:900,letterSpacing:.6}}>Emplacement</div>
                <div style={{fontSize:12,color:T.t1,fontWeight:800,marginTop:3}}>{a.empl}</div>
              </div>
            </div>
          </div>
        </div>
        <div style={{padding:'10px 14px calc(14px + env(safe-area-inset-bottom))',background:T.bg,borderTop:`1px solid ${T.border}`}}>
          <button onClick={onScan} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:T.accent,color:'#1a0e05',fontSize:14,fontWeight:900,letterSpacing:.3,display:'flex',alignItems:'center',justifyContent:'center',gap:8,cursor:'pointer'}}>
            <Ico d={ICONS.scan} s={18} sw={2.5} /> Scanner le suivant
          </button>
        </div>
      </>
    );
  }

  // ── Écran OK (article sans action requise) — escape hatch via "Détails"
  if (!invMode && !a.primary && addedActions.length === 0 && !showDetails) {
    return (
      <>
        <div style={{padding:'12px 14px',background:'#22c55e',color:'#06200f',display:'flex',alignItems:'center',gap:10,minHeight:52}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:9,border:'none',background:'rgba(0,0,0,.18)',color:'#06200f',padding:0,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><Ico d={ICONS.back} /></button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,fontWeight:900,letterSpacing:1.4,textTransform:'uppercase',opacity:.7}}>OK · {a.empl}</div>
            <div style={{fontSize:13,fontWeight:700}} className="tn">{a.code}</div>
          </div>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 24px 12px',textAlign:'center'}}>
          <div style={{width:96,height:96,borderRadius:99,background:'rgba(34,197,94,.18)',color:'#22c55e',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
            <Ico d={ICONS.check} s={48} sw={3} />
          </div>
          <div style={{fontSize:22,fontWeight:900,color:T.t1}}>Tout est OK</div>
          <div style={{fontSize:20,fontWeight:900,color:T.t1,marginTop:8,letterSpacing:.5}} className="tn">{a.code}</div>
          <div style={{fontSize:13,color:T.t2,marginTop:4,maxWidth:280,lineHeight:1.4}}>{a.lib}</div>
          <div style={{marginTop:22,padding:'10px 14px',background:T.card,borderRadius:12,border:`1px solid ${T.border}`,display:'grid',gridTemplateColumns:'repeat(4,minmax(48px,1fr))',gap:14}}>
            {[['Stock', a.stock, '#86efac'],['Min', a.min, T.t1],['Max', a.max, T.t1],['Couv.', a.couv+'j', T.t1]].map(([k,val,c])=>(
              <div key={k} style={{textAlign:'center'}}>
                <div style={{fontSize:8,color:T.t3,textTransform:'uppercase',letterSpacing:.6,fontWeight:800}}>{k}</div>
                <div style={{fontSize:18,fontWeight:900,color:c,marginTop:2,lineHeight:1}} className="tn">{val}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{padding:'10px 14px calc(14px + env(safe-area-inset-bottom))',background:T.bg,borderTop:`1px solid ${T.border}`,display:'flex',gap:8}}>
          <button onClick={()=>setShowDetails(true)} style={{padding:'14px 18px',borderRadius:12,border:`1px solid ${T.border}`,background:T.card,color:T.t1,fontSize:13,fontWeight:700,cursor:'pointer'}}>Détails</button>
          <button onClick={onScan} style={{flex:1,padding:'14px',borderRadius:12,border:'none',background:T.accent,color:'#1a0e05',fontSize:14,fontWeight:900,letterSpacing:.3,display:'flex',alignItems:'center',justifyContent:'center',gap:8,cursor:'pointer'}}>
            <Ico d={ICONS.scan} s={18} sw={2.5} /> Scanner le suivant
          </button>
        </div>
      </>
    );
  }

  return (
    <>
      {/* Verdict bandeau pleine largeur — remplace TopBar pour les états actionnables */}
      {a.primary && !invMode ? (
        <div style={{padding:'12px 14px',background:v.edge,color:'#0a0c10',display:'flex',alignItems:'center',gap:10,minHeight:52}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:9,border:'none',background:'rgba(0,0,0,.18)',color:'#0a0c10',padding:0,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><Ico d={ICONS.back} /></button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,fontWeight:900,letterSpacing:1.4,textTransform:'uppercase',opacity:.7}}>{v.label} · {a.empl}</div>
            <div style={{fontSize:13,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} className="tn">{a.code} · {a.lib}</div>
          </div>
        </div>
      ) : (
        <TopBar title={a.code} sub={a.lib} back onBack={onBack} onMenu={()=>{}} />
      )}
      {invMode && <InvBanner doneCount={invDoneCount} total={invTotal} zone={invZone} onTap={onInvOpen} onExit={onInvExit} />}
      <div style={{flex:1,padding:'12px 14px',overflow:'auto'}}>

        {/* HERO recommandation pleine largeur (action-first) */}
        {!invMode && a.primary && !addedActions.some(x=>x.kind===a.primary.kind) && (
          <div className="pop" style={{padding:'18px 4px 6px',background:'linear-gradient(180deg,'+v.edge+'22 0%, transparent 80%)',borderRadius:16,marginBottom:10,position:'relative'}}>
            <div style={{padding:'0 14px'}}>
              <div style={{fontSize:11,color:T.t3,fontWeight:800,letterSpacing:1,textTransform:'uppercase'}}>Recommandation PRISME</div>
              <div style={{display:'flex',alignItems:'baseline',gap:10,marginTop:6}}>
                <div style={{width:46,height:46,borderRadius:13,background:v.bg,color:v.fg,display:'flex',alignItems:'center',justifyContent:'center',alignSelf:'center'}}>
                  <Ico d={a.primary.kind==='retour'?ICONS.ret||ICONS.back:ICONS.cart||ICONS.fwd} s={24} sw={2} />
                </div>
                <span style={{fontSize:80,fontWeight:900,color:v.fg,lineHeight:.85,letterSpacing:-4}} className="tn">{a.primary.qty}</span>
                <span style={{fontSize:16,color:T.t2,fontWeight:600,marginBottom:6}}>pcs</span>
              </div>
              <div style={{fontSize:17,fontWeight:800,color:T.t1,marginTop:8,lineHeight:1.3}}>{a.primary.label} maintenant</div>
              <div style={{fontSize:12,color:T.t2,marginTop:4,lineHeight:1.5}}>{a.primary.sub}</div>
            </div>
            {editQty != null ? (
              <div style={{padding:'12px 14px 0'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:14,marginBottom:10}}>
                  <button onClick={()=>setEditQty(Math.max(0,editQty-1))} style={{width:64,height:64,borderRadius:14,border:`1px solid ${T.border}`,background:T.card,color:T.t1,fontSize:28,fontWeight:900,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                  <span style={{fontSize:48,fontWeight:900,color:v.fg,minWidth:80,textAlign:'center'}} className="tn">{editQty}</span>
                  <button onClick={()=>setEditQty(editQty+1)} style={{width:64,height:64,borderRadius:14,border:`1px solid ${T.border}`,background:T.card,color:T.t1,fontSize:28,fontWeight:900,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <button onClick={()=>setEditQty(null)} style={{padding:'14px',borderRadius:14,border:`1px solid ${T.border}`,background:T.card,color:T.t1,fontSize:13,fontWeight:700,cursor:'pointer'}}>Annuler</button>
                  <button onClick={()=>{const p=a.primary;const dest=p.kind==='corriger_stock'?'ERP · stock → '+editQty:p.kind==='retour'?'Centrale Lille → '+AGENCY:'Centrale Lille (commande auto)';const eta=p.kind==='corriger_stock'?'Immédiat':p.kind==='retour'?'Demain 9h':'48h ouvrées';const lbl=p.kind==='corriger_stock'?p.label+' · stock → '+editQty:p.label+(editQty?' ('+editQty+' pcs)':'');onAddAction(p.kind,lbl,dest,eta);setEditQty(null);}} style={{padding:'14px',borderRadius:14,border:'none',background:v.edge,color:'#0a0c10',fontSize:14,fontWeight:900,cursor:'pointer'}}>{'VALIDER · '+editQty+' pcs'}</button>
                </div>
              </div>
            ) : (
              <div style={{padding:'12px 14px 0',display:'grid',gridTemplateColumns:'2fr 1fr',gap:8}}>
                <button onClick={()=>{const p=a.primary;const dest=p.kind==='corriger_stock'?'ERP · stock → 0':p.kind==='retour'?'Centrale Lille → '+AGENCY:'Centrale Lille (commande auto)';const eta=p.kind==='corriger_stock'?'Immédiat':p.kind==='retour'?'Demain 9h':'48h ouvrées';const lbl=p.kind==='corriger_stock'?p.label+' · stock → 0':p.label+(p.qty?' ('+p.qty+' pcs)':'');onAddAction(p.kind,lbl,dest,eta);}} style={{padding:'17px',borderRadius:14,border:'none',background:v.edge,color:'#0a0c10',fontSize:15,fontWeight:900,letterSpacing:.4,cursor:'pointer'}}>{a.primary.kind==='corriger_stock'?'VALIDER':'VALIDER · '+a.primary.qty+' pcs'}</button>
                <button onClick={()=>setEditQty(a.primary.qty)} style={{padding:'17px',borderRadius:14,border:`1px solid ${T.border}`,background:T.card,color:T.t1,fontSize:13,fontWeight:700,cursor:'pointer'}}>Modifier</button>
              </div>
            )}
          </div>
        )}

        {/* Cartouche article — toujours visible (compact si action-first) */}
        <div className="pop" style={{background:T.card,borderRadius:16,border:`1px solid ${T.border}`,padding:'12px 14px',position:'relative',overflow:'hidden'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:T.t2,fontWeight:700,letterSpacing:.6}} className="tn">{a.code}</span>
            <span style={{padding:'2px 8px',borderRadius:99,background:v.bg,color:v.fg,fontSize:10,fontWeight:800,letterSpacing:.5,textTransform:'uppercase'}}>● {v.label}</span>
            <span style={{marginLeft:'auto',fontSize:10,color:T.t3,fontWeight:600}}>{a.sq}</span>
          </div>
          <div style={{fontSize:14,fontWeight:700,color:T.t1,marginTop:5,lineHeight:1.3}}>{a.lib}</div>
          <div style={{fontSize:11,color:T.t3,marginTop:2}}>{a.marque} · {a.fam}</div>

          {/* KPI row : Stock / Min / Max / Couv. */}
          <div style={{marginTop:12,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
            <div style={{padding:'8px 4px',background:'#0a0c10',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:8,color:T.t3,textTransform:'uppercase',letterSpacing:.6,fontWeight:800}}>Stock</div>
              <div style={{fontSize:20,fontWeight:900,color:v.fg,marginTop:2,lineHeight:1}} className="tn">{a.stock}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>actuel</div>
            </div>
            <div style={{padding:'8px 4px',background:'#0a0c10',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:8,color:T.t3,textTransform:'uppercase',letterSpacing:.6,fontWeight:800}}>Min</div>
              <div style={{fontSize:18,fontWeight:900,color:T.t1,marginTop:2,lineHeight:1}} className="tn">{a.min}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>seuil</div>
            </div>
            <div style={{padding:'8px 4px',background:'#0a0c10',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:8,color:T.t3,textTransform:'uppercase',letterSpacing:.6,fontWeight:800}}>Max</div>
              <div style={{fontSize:18,fontWeight:900,color:T.t1,marginTop:2,lineHeight:1}} className="tn">{a.max}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>cible</div>
            </div>
            <div style={{padding:'8px 4px',background:'#0a0c10',borderRadius:10,textAlign:'center'}}>
              <div style={{fontSize:8,color:T.t3,textTransform:'uppercase',letterSpacing:.6,fontWeight:800}}>Couv.</div>
              <div style={{fontSize:18,fontWeight:900,color:T.t1,marginTop:2,lineHeight:1}} className="tn">{a.couv}j</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}} className="tn">{a.vitesse||''}</div>
            </div>
          </div>

          {/* Empl + prix */}
          <div style={{marginTop:8,display:'grid',gridTemplateColumns: a.prix != null ? '1.4fr 1fr' : '1fr',gap:6}}>
            <div style={{padding:'10px 14px',background:'#0a0c10',borderRadius:12}}>
              <div style={{fontSize:9,color:T.t3,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Emplacement</div>
              <div style={{fontSize:18,fontWeight:800,color:T.accent,marginTop:2}}>{a.empl}</div>
            </div>
            {a.prix != null && (
              <button onClick={()=>setPriceShown(p=>!p)} style={{padding:'10px 14px',background:'#0a0c10',borderRadius:12,border:'none',color:T.t1,textAlign:'left',cursor:'pointer'}}>
                <div style={{fontSize:9,color:T.t3,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Prix moy. <span style={{color:T.t3,fontWeight:500,fontSize:8}}>· {a.marge}%</span></div>
                <div style={{fontSize:15,fontWeight:700,color:T.t1,marginTop:2,filter:priceShown?'none':'blur(5px)',transition:'filter .15s'}} className="tn">{a.prix.toFixed(2)} €</div>
              </button>
            )}
          </div>

          {/* Détails intégrés */}
          <button onClick={()=>setDetailsOpen(d=>!d)} style={{marginTop:8,width:'100%',padding:'8px 10px',background:'#0a0c10',borderRadius:10,color:T.t3,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:5,border:'none'}}>
            <Ico d={detailsOpen ? "<path d='M18 15l-6-6-6 6'/>" : "<path d='M6 9l6 6 6-6'/>"} s={12} sw={2.5} />{detailsOpen ? 'Masquer' : 'Plus de détails'}
          </button>
          {detailsOpen && (
            <div style={{padding:'8px 10px',color:T.t2,fontSize:11,lineHeight:1.8,background:'#0a0c10',borderRadius:'0 0 10px 10px',marginTop:-2}}>
              <div><span style={{color:T.t3}}>Code-barre</span> <strong style={{color:T.t1}}>{(()=>{ if (!window._eanMap) return '—'; for (const [ean,c] of window._eanMap) { if (c===a.code) return ean; } return '—'; })()}</strong></div>
              {getCustomEansForCode(a.code).length > 0 && (
                <div style={{marginTop:2,marginBottom:2}}>
                  <span style={{color:T.t3}}>Associations</span>
                  {getCustomEansForCode(a.code).map(ean=>(
                    <div key={ean} style={{display:'inline-flex',alignItems:'center',gap:4,marginLeft:6,padding:'1px 6px',background:'rgba(251,146,60,.12)',borderRadius:6}}>
                      <strong style={{color:T.t1,fontFamily:'ui-monospace,monospace',fontSize:11}}>{ean}</strong>
                      <button onClick={(ev)=>{ ev.stopPropagation(); removeCustomEan(ean); setFlip(f=>f+1); }} style={{background:'none',border:'none',color:'#fca5a5',fontSize:13,fontWeight:800,padding:'0 2px',cursor:'pointer',lineHeight:1}}>x</button>
                    </div>
                  ))}
                </div>
              )}
              <div><span style={{color:T.t3}}>Réf. fournisseur</span> <strong style={{color:T.t1}}>{a.refFourn || '—'}</strong></div>
              <div><span style={{color:T.t3}}>Statut</span> <strong style={{color:T.t1}}>{a.statut}</strong></div>
              <div><span style={{color:T.t3}}>Squelette</span> <strong style={{color:T.t1}}>{a.sq}</strong></div>
              <div><span style={{color:T.t3}}>ERP MIN/MAX</span> <strong style={{color:T.t1}}>{(a.erpMin === a.min && a.erpMax === a.max) ? `${a.min}/${a.max}` : `${a.erpMin}/${a.erpMax} (à corriger)`}</strong></div>
            </div>
          )}
        </div>

        {/* Inv mode quick count */}
        {invMode && (
          <div className="pop" style={{marginTop:10,padding:'12px 14px',background:'#16301f',borderRadius:14,border:'1px solid rgba(34,197,94,.3)'}}>
            <div style={{fontSize:10,color:'#86efac',fontWeight:800,letterSpacing:.6,textTransform:'uppercase'}}>Compter cet article</div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
              <button onClick={()=>setInvCount(c=>Math.max(0,c-1))} style={{...numBtn(),width:44,height:44}}><Ico d={ICONS.minus} s={18} /></button>
              <div style={{flex:1,textAlign:'center',padding:'8px',background:'rgba(0,0,0,.3)',borderRadius:10}}>
                <div style={{fontSize:32,fontWeight:900,color:'#86efac',lineHeight:1}} className="tn">{invCount}</div>
                <div style={{fontSize:9,color:T.t3,marginTop:2}}>compté · ERP {a.stock}</div>
              </div>
              <button onClick={()=>setInvCount(c=>c+1)} style={{...numBtn(),width:44,height:44}}><Ico d={ICONS.plus} s={18} /></button>
            </div>
            <button onClick={()=>onInvCount(invCount)} style={{
              width:'100%',marginTop:8,padding:'12px',borderRadius:11,border:'none',
              background:'#22c55e',color:'#06200f',fontSize:13,fontWeight:800,
              display:'flex',alignItems:'center',justifyContent:'center',gap:6,
            }}>
              <Ico d={ICONS.check} s={14} sw={3} /> Valider · suivant
            </button>
          </div>
        )}

        {/* Actions déjà ajoutées */}
        {addedActions.length > 0 && (
          <div style={{marginTop:10,padding:'10px 12px',background:'rgba(251,191,36,.08)',borderRadius:12,border:'1px solid rgba(251,191,36,.25)'}}>
            <div style={{fontSize:10,color:'#fbbf24',fontWeight:800,letterSpacing:.6,textTransform:'uppercase',marginBottom:6}}>✓ {addedActions.length} action{addedActions.length>1?'s':''} en attente</div>
            {addedActions.map((act,i)=>(
              <div key={i} style={{fontSize:12,color:T.t1,padding:'2px 0'}}>· {act.label}</div>
            ))}
          </div>
        )}

        {/* Action secondaire / ERP / ajouter (la primary est d\u00e9j\u00e0 dans le hero ci-dessus) */}
        {!invMode && (() => {
          const erpAction = (a.secondary||[]).find(s=>!addedActions.some(x=>x.kind===s.kind));
          if (erpAction) return (
            <button onClick={onActions} style={{
              width:'100%',marginTop:12,padding:'12px 14px',borderRadius:14,border:'none',
              background:'#eab308',color:'#0a0c10',textAlign:'left',
              display:'flex',alignItems:'center',gap:12,
            }}>
              <div style={{width:40,height:40,borderRadius:10,background:'rgba(0,0,0,.18)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16,fontWeight:800}}>ERP</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:800}}>{erpAction.label}</div>
                <div style={{fontSize:11,opacity:.75,marginTop:1}}>{erpAction.sub}</div>
              </div>
              <Ico d={ICONS.fwd} s={18} sw={2.5} />
            </button>
          );
          if (addedActions.length === 0) return (
            <button onClick={onActions} style={{
              width:'100%',marginTop:12,padding:'13px 14px',borderRadius:12,
              background:T.card,color:T.t1,border:`1px solid ${T.border}`,
              display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:13,fontWeight:700,
            }}>
              <Ico d="<path d='M12 5v14M5 12h14'/>" s={16} sw={2.5} />Ajouter une action
            </button>
          );
          return null;
        })()}
        {!invMode && (
          <button onClick={onActions} style={{
            width: addedActions.length > 0 ? '100%' : 0,
            display: addedActions.length > 0 ? 'flex' : 'none',
            marginTop:10,padding:'12px 14px',borderRadius:12,
            background:'rgba(255,255,255,.04)',color:T.t1,border:`1px dashed ${T.border}`,
            alignItems:'center',justifyContent:'center',gap:8,fontSize:13,fontWeight:700,
          }}>
            <Ico d="<path d='M12 5v14M5 12h14'/>" s={16} sw={2.5} />Ajouter une autre action
          </button>
        )}

      </div>

      <BottomBar onSearch={onBack} onScan={onScan} onActions={onTodo} count={onActionsCount} primary={a.primary && !invMode} />
    </>
  );
}

const numBtn = () => ({
  borderRadius:10,border:`1px solid ${T.border}`,background:'rgba(0,0,0,.3)',
  color:T.t1,display:'flex',alignItems:'center',justifyContent:'center',padding:0,
});

// ── Sheets ────────────────────────────────────────────────────
function Sheet({ children, onClose, title, h='auto' }) {
  return (
    <div onClick={onClose} className="sheet-bg" style={{position:'absolute',inset:0,background:'rgba(0,0,0,.5)',zIndex:100,display:'flex',alignItems:'flex-end'}}>

function CameraSheet({ continu=true, onClose, onPick, onBatch, onUnknown }) {
  const [haptic, setHaptic] = useState(true);
  const [unreadable, setUnreadable] = useState(false);
  const [detected, setDetected] = useState([]); // [{...article, count, lastTs, firstTs}]
  const [flash, setFlash] = useState(0); // increment to trigger flash
  const [dupNotice, setDupNotice] = useState(null);
  const [unknownNotice, setUnknownNotice] = useState(null); // barcode EAN non résolu
  const [batchOpen, setBatchOpen] = useState(false);

  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const canvasRef = useRef(null);
  const ctxRef = useRef(null);
  const scanTimer = useRef(null);
  const scanPassRef = useRef(0);
  const lastCodesRef = useRef(new Map()); // Map<barcode, ts> anti-doublon brut
  const directBufRef = useRef(null); // buffer mode direct : {barcode, artCode, timer}
  const DIRECT_SCAN_SETTLE_MS = 120;

  // Résoudre un code-barre scanné → code article PRISME
  const resolveBarcode = (barcode) => {
    const clean = barcode.replace(/\D/g, '');
    // 1) Code article direct (5-6 chiffres)
    let a = _artByCode.get(clean) || _artByCode.get(_normCode(clean));
    if (a) return a.code;
    // 2) Ref fournisseur
    a = _artByRef.get(barcode) || _artByRef.get(barcode.toUpperCase());
    if (a) return a.code;
    // 3) Custom EAN (associations terrain)
    const custom = _customEanMap.get(clean);
    if (custom && (_artByCode.get(custom) || _catalogHas(custom))) return _normCode(custom);
    // 4) EAN via IDB eanMap (chargé globalement)
    if (window._eanMap) {
      const c = _normCode(window._eanMap.get(clean));
      if (c && (_artByCode.get(c) || _catalogHas(c))) return c;
    }
    return null; // inconnu
  };

  const tryAdd = (code, barcode) => {
    const a = _artByCode.get(code) || _catalogArticle(code); if (!a) return;
    const barHint = (barcode && barcode !== code) ? '....' + barcode.slice(-4) : '';
    const now = Date.now();
    setDetected(d => {
      const i = d.findIndex(x => x.code === code);
      if (i >= 0) {
        // Anti-doublon : si <3s, ignore. Sinon, +1 quantité scannée.
        if (now - d[i].lastTs < 3000) {
          setDupNotice({ code, lib: a.lib }); setTimeout(()=>setDupNotice(null), 1400);
          return d;
        }
        const next = [...d];
        next[i] = {...next[i], count: next[i].count + 1, lastTs: now};
        return next;
      }
      return [{...a, count:1, firstTs:now, lastTs:now, barHint}, ...d];
    });
    setFlash(f => f + 1);
    if (haptic) _beep();
  };

  // Boucle de scan caméra
  const scanLoop = async () => {
    const video = videoRef.current;
    if (!video || !streamRef.current) return;
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) { scanTimer.current = setTimeout(scanLoop, 100); return; }

    if (!canvasRef.current) {
      canvasRef.current = document.createElement('canvas');
      ctxRef.current = canvasRef.current.getContext('2d', { willReadFrequently: true });
    }
    const canvas = canvasRef.current, ctx = ctxRef.current;

    // Viewfinder : carré centré 76% largeur
    const VF = 0.76;
    const side = Math.round(Math.min(vw, vh) * VF);
    const cx = Math.round((vw - side) / 2);
    const cy = Math.round((vh - side) / 2);

    // Alterner carré plein / bande laser
    scanPassRef.current++;
    let cw, ch, sy;
    if (scanPassRef.current % 2 === 0) {
      cw = side; ch = side; sy = cy;
    } else {
      const bandH = Math.round(side * 0.15);
      cw = side; ch = bandH; sy = cy + Math.round((side - bandH) / 2);
    }

    canvas.width = cw; canvas.height = ch;
    ctx.drawImage(video, cx, sy, cw, ch, 0, 0, cw, ch);
    const imageData = ctx.getImageData(0, 0, cw, ch);

    try {
      const hasZbar = typeof zbarWasm !== 'undefined';
      const zxingP = (typeof ZXingWASM !== 'undefined')
        ? ZXingWASM.readBarcodes(imageData, {
            tryHarder: true,
            formats: ['EAN-13', 'EAN-8', 'Code128', 'Code39'],
            maxNumberOfSymbols: 4,
          }).then(res => res.map(r => ({ text: r.text, format: r.format })))
        : Promise.resolve([]);

      const zbarP = hasZbar
        ? zbarWasm.scanImageData(imageData).then(symbols =>
            symbols.map(s => ({ text: s.decode(), format: 'ZBar-' + s.typeName }))
          ).catch(() => [])
        : Promise.resolve([]);

      const [zxingRes, zbarRes] = await Promise.all([zxingP, zbarP]);
      const seen = new Set();
      const merged = [];
      for (const r of [...zbarRes, ...zxingRes]) {
        if (!r.text || seen.has(r.text)) continue;
        seen.add(r.text);
        merged.push(r);
      }

      const now = Date.now();
      for (const r of merged) {
        const barcode = r.text.replace(/\s/g, '');
        if (!/^\d{5,13}$/.test(barcode)) continue;
        // Anti-doublon brut 2s sur le code-barre brut
        const prev = lastCodesRef.current.get(barcode);
        if (prev && now - prev < 2000) continue;
        lastCodesRef.current.set(barcode, now);

        // Résoudre vers un article PRISME
        const artCode = resolveBarcode(barcode);
        // Ignorer codes courts non résolus (lectures partielles)
        if (!artCode && barcode.length < 8) continue;
        if (!continu) {
          // Mode direct : attendre brièvement les autres passes, puis choisir le meilleur candidat.
          const buf = directBufRef.current;
          const shouldReplace = !buf
            || (artCode && !buf.artCode)
            || (barcode.length > buf.barcode.length);
          if (!buf) {
            const timer = setTimeout(() => {
              const best = directBufRef.current;
              directBufRef.current = null;
              if (!best) return;
              if (best.artCode) {
                _beep();
                onPick(best.artCode);
              } else if (best.barcode.length >= 8 && onUnknown) {
                onUnknown(best.barcode);
              }
            }, DIRECT_SCAN_SETTLE_MS);
            directBufRef.current = { barcode, artCode, timer };
          } else if (shouldReplace) {
            directBufRef.current = { ...buf, barcode, artCode };
          }
          continue;
        }
        if (artCode) {
          tryAdd(artCode, barcode);
        } else if (barcode.length >= 8) {
          setUnknownNotice(barcode);
          if (haptic) _beepError();
        }
      }
    } catch (e) {
      console.warn('[Scan] erreur:', e);
    }

    scanTimer.current = setTimeout(scanLoop, 80); // ~12 fps
  };

  // Démarrer la caméra au montage
  useEffect(() => {
    // Débloquer AudioContext iOS dès le montage (dans la call stack du tap utilisateur)
    try {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
    } catch(e){}
    let cancelled = false;
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false,
        });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play().then(() => { scanLoop(); });
        }
      } catch (err) {
        console.warn('Camera:', err);
        setUnreadable(true);
      }
    })();
    return () => {
      cancelled = true;
      if (scanTimer.current) clearTimeout(scanTimer.current);
      if (directBufRef.current?.timer) clearTimeout(directBufRef.current.timer);
      directBufRef.current = null;
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, []);

  const counts = detected.reduce((acc, x) => {
    if (x.verdict === 'rupture' || x.verdict === 'sousmin') acc.attention++;
    return acc;
  }, { attention: 0 });

  return (
    <div className="sheet-bg" style={{position:'absolute',inset:0,background:'#000',zIndex:100,display:'flex',flexDirection:'column'}}>
      {/* Flash on detect */}
      <div key={flash} style={{position:'absolute',inset:0,background:'rgba(34,197,94,.3)',pointerEvents:'none',zIndex:5,opacity:0,animation: flash > 0 ? 'fadeFlash .35s ease-out forwards' : 'none'}} />

      {/* Flux caméra */}
      <div style={{flex:1,position:'relative',overflow:'hidden',background:'#000'}}>
        <video ref={videoRef} playsInline autoPlay muted style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}} />
        <div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(255,255,255,.02) 2px,rgba(255,255,255,.02) 3px)'}} />
        <div style={{position:'absolute',left:'12%',right:'12%',height:2,background:'linear-gradient(90deg,transparent,#fb923c,transparent)',animation:'scanline 2s ease-in-out infinite',boxShadow:'0 0 20px #fb923c'}} />
        <div style={{position:'absolute',left:'12%',top:'15%',right:'12%',aspectRatio:1,border:'2px solid rgba(255,255,255,.4)',borderRadius:18,boxShadow:'0 0 0 9999px rgba(0,0,0,.55)'}}>
          {['tl','tr','bl','br'].map(p => {
            const s = {position:'absolute',width:24,height:24,borderColor:'#fb923c',borderStyle:'solid',borderWidth:0,
              ...(p[0]==='t'?{top:-3}:{bottom:-3}), ...(p[1]==='l'?{left:-3}:{right:-3}),
              ...(p[0]==='t'?{borderTopWidth:4}:{borderBottomWidth:4}),
              ...(p[1]==='l'?{borderLeftWidth:4}:{borderRightWidth:4}),
            };
            return <div key={p} style={s} />;
          })}
        </div>

        {/* close */}
        <button onClick={onClose} style={{position:'absolute',top:14,left:14,width:38,height:38,borderRadius:99,background:'rgba(0,0,0,.6)',border:'none',color:'#fff',padding:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Ico d={ICONS.close} s={18} sw={2.5} />
        </button>

        {/* Counter pill (top center) */}
        <div style={{position:'absolute',top:14,left:'50%',transform:'translateX(-50%)',display:'flex',alignItems:'center',gap:6,padding:'6px 10px 6px 8px',background:'rgba(0,0,0,.6)',borderRadius:99,backdropFilter:'blur(8px)'}}>
          <div style={{width:20,height:20,borderRadius:99,background:detected.length>0?'#22c55e':'rgba(255,255,255,.15)',color:'#000',fontSize:11,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}} className="tn">{detected.length}</div>
          <span style={{fontSize:11,color:'#fff',fontWeight:700,letterSpacing:.3}}>scanné{detected.length>1?'s':''}</span>
          {counts.attention > 0 && (
            <>
              <span style={{width:1,height:12,background:'rgba(255,255,255,.2)'}} />
              <Dot c="#ef4444" s={6} />
              <span style={{fontSize:11,color:'#fca5a5',fontWeight:700}} className="tn">{counts.attention}</span>
            </>
          )}
        </div>

        {/* Haptic toggle */}
        <button onClick={()=>setHaptic(h=>!h)} style={{position:'absolute',top:14,right:96,width:38,height:38,borderRadius:99,background:'rgba(0,0,0,.6)',border:'none',color:haptic?'#fb923c':'rgba(255,255,255,.4)',padding:0,display:'flex',alignItems:'center',justifyContent:'center'}} title={haptic?'Vibreur on':'Vibreur off'}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            {haptic ? <><path d="M12 6v12"/><path d="M8 9v6"/><path d="M16 9v6"/><path d="M4 11v2"/><path d="M20 11v2"/></> : <><path d="M12 6v12"/><path d="M3 3l18 18"/></>}
          </svg>
        </button>

        {/* mode chip */}
        <div style={{position:'absolute',top:14,right:14,padding:'6px 10px',background: continu ? 'rgba(96,165,250,.9)' : 'rgba(251,146,60,.9)',color: continu ? '#fff' : '#1a0e05',borderRadius:99,fontSize:10,fontWeight:800,letterSpacing:.5}}>{continu ? 'CONTINU' : 'DIRECT'}</div>

        {/* Dup notice */}
        {unreadable && (
          <div className="pop" style={{position:'absolute',top:60,left:'50%',transform:'translateX(-50%)',padding:'8px 14px',background:'rgba(239,68,68,.95)',color:'#fff',borderRadius:99,fontSize:11,fontWeight:800,whiteSpace:'nowrap'}}>⚠ Code illisible · rapproche-toi</div>
        )}
        {dupNotice && (
          <div className="pop" style={{position:'absolute',top:60,left:'50%',transform:'translateX(-50%)',padding:'8px 14px',background:'rgba(251,191,36,.95)',color:'#1a0e05',borderRadius:99,fontSize:11,fontWeight:800,whiteSpace:'nowrap'}}>↻ Déjà scanné · {dupNotice.code}</div>
        )}
        {unknownNotice && (
          <div className="pop" style={{position:'absolute',top:60,left:'50%',transform:'translateX(-50%)',display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:'rgba(239,68,68,.95)',color:'#fff',borderRadius:99,fontSize:11,fontWeight:800,whiteSpace:'nowrap'}}>
            <span>? {unknownNotice}</span>
            <button onClick={()=>{ setUnknownNotice(null); onUnknown && onUnknown(unknownNotice); }} style={{background:'#fff',color:'#b91c1c',border:'none',borderRadius:99,padding:'3px 10px',fontSize:10,fontWeight:900,cursor:'pointer'}}>Associer</button>
            <button onClick={()=>setUnknownNotice(null)} style={{background:'none',border:'none',color:'rgba(255,255,255,.7)',fontSize:14,fontWeight:800,cursor:'pointer',padding:'0 2px'}}>✕</button>
          </div>
        )}

        {/* hint */}
        <div style={{position:'absolute',bottom:24,left:0,right:0,textAlign:'center',color:'rgba(255,255,255,.7)',fontSize:12,fontWeight:500,padding:'0 20px'}}>
          {detected.length === 0 ? 'Pointez le code-barre dans le cadre...' : (continu ? 'Continue · ou tape ↑ pour traiter' : '1 scan effectué')}
        </div>
      </div>

      {/* Bottom sheet of detected codes */}
      <div className="sheet" style={{background:T.bg,borderRadius:'20px 20px 0 0',maxHeight:batchOpen?'70%':'48%',transition:'max-height .25s ease',overflow:'auto',paddingBottom:'max(18px, env(safe-area-inset-bottom))'}}>
        <div onClick={()=>detected.length>0 && setBatchOpen(b=>!b)} style={{cursor:'pointer'}}>

function DouchetteScreen({ onBack, onArticle }) {
  const [last, setLast] = useState(null); // article scanned
  const [history, setHistory] = useState([]); // [{code, ts}]
  const [buf, setBuf] = useState('');
  const inputRef = useRef(null);
  const lastKeyRef = useRef(0);

  // Débloquer AudioContext iOS + refocus hidden input
  useEffect(() => {
    try {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
    } catch(e){}
    const f = () => inputRef.current?.focus();
    f();
    const id = setInterval(f, 600);
    document.addEventListener('click', f);
    return () => { clearInterval(id); document.removeEventListener('click', f); };
  }, []);

  const bufRef = useRef('');
  const timerRef = useRef(null);
  const resolveAndShow = (raw) => {
    const clean = raw.replace(/\D/g,'');
    let a = _artByCode.get(clean);
    if (!a) a = _artByRef.get(raw) || _artByRef.get(raw.toUpperCase());
    if (!a && _customEanMap.has(clean)) { const m = _normCode(_customEanMap.get(clean)); a = _artByCode.get(m) || _catalogArticle(m); }
    if (!a && window._eanMap) { const c = _normCode(window._eanMap.get(clean)); a = _artByCode.get(c) || _catalogArticle(c); }
    if (!a) a = _catalogArticle(clean);
    if (!a) return;
    setLast({...a, ts:Date.now()});
    setHistory(h => [{code:a.code, lib:a.lib, ts:Date.now()}, ...h].slice(0,8));
  };
  const flush = () => {
    const v = bufRef.current.trim();
    if (v) resolveAndShow(v);
    bufRef.current = '';
    setBuf('');
  };
  const onChange = (e) => {
    const v = e.target.value;
    bufRef.current = v;
    setBuf(v);
    // Auto-flush après 80ms sans nouveau caractère (douchette rapide + pas de Enter)
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(flush, 80);
  };
  const onKey = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); clearTimeout(timerRef.current); flush(); }
  };

  const fakeScan = (code) => resolveAndShow(code);

  return (
    <>
      <TopBar title="Mode douchette" sub="Scanner Zebra · clavier masqué" back onBack={onBack} onMenu={()=>{}} />
      {/* Input capte les keystrokes de la douchette */}
      <input
        ref={inputRef}
        value={buf}
        onChange={onChange}
        onKeyDown={onKey}
        autoFocus
        inputMode="none"
        style={{position:'fixed',top:0,left:0,width:'100%',height:44,opacity:0.01,zIndex:-1,fontSize:16,border:'none'}}
      />
      <div style={{flex:1,padding:'14px 16px',overflow:'auto',display:'flex',flexDirection:'column'}}>
        {!last ? (
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'30px 20px'}}>
            <div style={{width:88,height:88,borderRadius:99,background:'rgba(167,139,250,.12)',display:'flex',alignItems:'center',justifyContent:'center',color:'#a78bfa',marginBottom:14}}>
              <Ico d={ICONS.scan} s={42} sw={2} />
            </div>
            <div style={{fontSize:16,fontWeight:800,color:T.t1}}>En attente de scan</div>
            <div style={{fontSize:12,color:T.t2,marginTop:6,maxWidth:240,lineHeight:1.5}}>Pointe la douchette Zebra et appuie sur la gâchette. Le clavier ne s'affichera pas.</div>
            <div style={{marginTop:18,display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center'}}>
              {[ARTICLES[0],ARTICLES[1],ARTICLES[2]].map(x=>(
                <button key={x.code} onClick={()=>fakeScan(x.code)} style={{padding:'6px 10px',borderRadius:99,background:'rgba(255,255,255,.04)',border:`1px solid ${T.border}`,color:T.t2,fontSize:11,fontWeight:600}} className="tn">simuler {x.code}</button>
              ))}
            </div>
          </div>
        ) : (
          <button onClick={()=>onArticle(last.code)} key={last.ts} className="pop" style={{
            background:T.card,borderRadius:18,border:`1px solid ${T.border}`,
            borderLeft:`4px solid ${VC[last.verdict].edge}`,
            padding:'16px 18px',color:T.t1,textAlign:'left',cursor:'pointer',
          }}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:16,color:T.t1,fontWeight:900,letterSpacing:.4}} className="tn">{last.code}</span>
              <span style={{padding:'2px 8px',borderRadius:99,background:VC[last.verdict].bg,color:VC[last.verdict].fg,fontSize:10,fontWeight:800,letterSpacing:.5,textTransform:'uppercase'}}>{VC[last.verdict].label}</span>
              <span style={{marginLeft:'auto',fontSize:10,color:'#a78bfa',fontWeight:700}}>● SCANNÉ</span>
            </div>
            <div style={{fontSize:18,fontWeight:800,marginTop:8,lineHeight:1.25}}>{last.lib}</div>
            <div style={{fontSize:12,color:T.t2,marginTop:3}}>{last.marque} · {last.fam}</div>

function EanSheet({ onClose, onPick }) {
  const [flip, setFlip] = useState(0);
  const entries = [..._customEanMap.entries()];
  const exportCsv = () => {
    if (entries.length === 0) return;
    let csv = 'EAN;Code Article;Libelle\n';
    for (const [ean, code] of entries) {
      const a = _artByCode.get(code);
      csv += `${ean};${code};${(a?.lib || '').replace(/;/g, ',')}\n`;
    }
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url; link.download = 'associations-ean.csv'; link.click();
    URL.revokeObjectURL(url);
  };
  return (
    <Sheet onClose={onClose} title={`Associations EAN (${entries.length})`}>
      <div style={{padding:'4px 14px 0'}}>
        {entries.length === 0 ? (
          <div style={{padding:'20px',color:T.t2,fontSize:12,textAlign:'center'}}>Aucune association enregistree</div>
        ) : (
          <>
            <div style={{maxHeight:'50vh',overflowY:'auto'}}>
              {entries.map(([ean, code]) => {
                const a = _artByCode.get(code);
                return (
                  <div key={ean} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:T.card,borderRadius:10,border:`1px solid ${T.border}`,marginBottom:4}}>
                    <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>onPick(code)}>
                      <div style={{fontSize:12,fontWeight:700,color:T.accent,fontFamily:'ui-monospace,monospace'}} className="tn">{ean}</div>
                      <div style={{fontSize:11,color:T.t3,marginTop:1}} className="tn">{code} <span style={{color:T.t2,fontFamily:'inherit'}}>{a?.lib || '?'}</span></div>
                    </div>
                    <button onClick={()=>{ removeCustomEan(ean); setFlip(f=>f+1); }} style={{background:'none',border:'none',color:'#fca5a5',fontSize:16,fontWeight:800,padding:'4px 8px',cursor:'pointer'}}>x</button>
                  </div>
                );
              })}
            </div>
            <button onClick={exportCsv} style={{width:'100%',marginTop:8,padding:'12px',borderRadius:12,border:`1px solid ${T.border}`,background:'rgba(255,255,255,.03)',color:T.t1,fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              Exporter CSV
              <Ico d={ICONS.fwd} s={14} sw={2.5} />
            </button>
          </>
        )}
      </div>
    </Sheet>
  );
}

function JournalSheet({ onClose, actions, onPick, onUndo, onValidate, onPush, onPurge, onLabels }) {
  const all = [];
  Object.keys(actions).forEach(c => actions[c].forEach(x => all.push({...x, code:c})));

  all.sort((a,b) => {
    const ea = _artByCode.get(a.code)?.empl || 'ZZZ';
