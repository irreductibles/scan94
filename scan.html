  }));
  const seen = new Set();
  const list = items.filter(x => { if (seen.has(x.code)) return false; seen.add(x.code); return true; })
    .map(x => {
      const a = _artByCode.get(x.code);
      return { ...x, lib: a?.lib || '—', status: x.status };
    });
  const pending = list.filter(x => x.status === 'pending');
  const printed = list.filter(x => x.status === 'validee');

  const csv = useMemo(() => {
    let s = '"Code article","Quantité"\n';
    pending.forEach(x => { s += `"${x.code}","1"\n`; });
    return s;
  }, [pending]);

  const downloadCsv = () => {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'commande-rapide-legallais.csv';
    a.click(); setTimeout(()=>URL.revokeObjectURL(url), 500);
    onMarkAllPrinted();
  };
  const copyCsv = async () => {
    try { await navigator.clipboard.writeText(csv); } catch(e) {}
    onMarkAllPrinted();
  };

  return (
    <Sheet onClose={onClose} title="Étiquettes manquantes">
      <div style={{padding:'4px 14px 0'}}>
        {list.length === 0 ? (
          <div style={{textAlign:'center',padding:'30px 20px',color:T.t2}}>
            <div style={{fontSize:13}}>Aucune étiquette en attente</div>
            <div style={{fontSize:11,color:T.t3,marginTop:6}}>Ajoute "Étiquette manquante" sur une fiche article</div>
          </div>
        ) : (
          <>
            {pending.length > 0 && (<>
              <div style={{fontSize:10,color:'#c4b5fd',fontWeight:800,letterSpacing:.6,textTransform:'uppercase',padding:'4px 4px 8px',display:'flex',alignItems:'center',gap:6}}>
                <span>À imprimer</span><span style={{color:T.t3,fontWeight:600}}>· {pending.length}</span>
              </div>
              {pending.map((x,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:12,background:'rgba(167,139,250,.05)',border:'1px solid rgba(167,139,250,.18)',marginBottom:6}}>
                  <Dot c="#a78bfa" s={7} />
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:T.t1,fontFamily:'ui-monospace,Menlo,monospace',fontWeight:700}}>{x.code}</div>
                    <div style={{fontSize:11,color:T.t2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginTop:1}}>{x.lib}</div>
                  </div>
                  <button onClick={()=>onMarkPrinted(x.code, x.id)} style={{
                    padding:'8px 12px',borderRadius:10,
                    border:'1px solid rgba(34,197,94,.35)',
                    background:'rgba(34,197,94,.12)',color:'#86efac',
                    fontSize:11,fontWeight:800,letterSpacing:.3,
                    display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap',
                  }}>
                    <Ico d={ICONS.check} s={12} sw={2.5} />
                    Faite
                  </button>
                </div>
              ))}

              <div style={{display:'flex',gap:6,marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
                <button onClick={copyCsv} style={{
                  flex:1,padding:'12px',borderRadius:11,
                  background:'rgba(255,255,255,.04)',color:T.t1,fontSize:12,fontWeight:700,
                  border:`1px solid ${T.border}`,
                }}>Copier CSV</button>
                <button onClick={downloadCsv} style={{
                  flex:2,padding:'12px',borderRadius:11,border:'none',
                  background:'#fff',color:'#000',fontSize:13,fontWeight:800,letterSpacing:.2,
                  display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                }}>
                  <Ico d={ICONS.download} s={15} sw={2.5} />
                  Télécharger · {pending.length} réf{pending.length>1?'s':''}
                </button>
              </div>
            </>)}

            {printed.length > 0 && (
              <div style={{marginTop: pending.length > 0 ? 14 : 0}}>
                <div style={{fontSize:10,color:'#86efac',fontWeight:800,letterSpacing:.6,textTransform:'uppercase',padding:'4px 4px 8px',display:'flex',alignItems:'center',gap:6}}>
                  <span>Imprimées</span><span style={{color:T.t3,fontWeight:600}}>· {printed.length}</span>
                </div>
                {printed.map((x,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:12,background:'rgba(34,197,94,.04)',border:'1px solid rgba(34,197,94,.12)',marginBottom:4,opacity:.6}}>
                    <Ico d={ICONS.check} s={13} sw={2.5} />
                    <div style={{flex:1,minWidth:0}}>
                      <span style={{fontSize:12,color:T.t2,fontFamily:'ui-monospace,Menlo,monospace',fontWeight:600}}>{x.code}</span>
                      <span style={{fontSize:11,color:T.t3,marginLeft:8}}>{x.lib}</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </>
        )}
      </div>
    </Sheet>
  );
}

// ── StockEditSheet — saisie compté physique ───────────────────
function StockEditSheet({ code, onClose, onConfirm }) {
  const a = _artByCode.get(code);
  const [val, setVal] = useState(String(a ? a.stock : ''));
  if (!a) return null;
  const n = parseInt(val,10);
  const valid = !isNaN(n) && n >= 0;
  const delta = valid ? n - a.stock : 0;
  const tap = (k) => {
    if (k === 'del') setVal(v => v.length <= 1 ? '0' : v.slice(0,-1));
    else if (k === 'c') setVal('0');
    else setVal(v => v === '0' ? k : (v + k).slice(0,4));
  };
  const keys = ['1','2','3','4','5','6','7','8','9','c','0','del'];
  return (
    <Sheet onClose={onClose} title="Modifier le stock">
      <div style={{padding:'4px 14px 0'}}>
        <div style={{fontSize:11,color:T.t3,padding:'0 4px 10px'}} className="tn">{a.code} · {a.lib}</div>
        <div style={{padding:'18px 16px',background:'rgba(255,255,255,.03)',borderRadius:14,border:`1px solid ${T.border}`,marginBottom:12,textAlign:'center'}}>
          <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>ERP actuel</div>
          <div style={{fontSize:18,color:T.t2,fontWeight:700,marginTop:2,marginBottom:14}} className="tn">{a.stock} pcs</div>
          <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Nouveau stock</div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:14,marginTop:6}}>
            <button onClick={()=>setVal(v=>{const x=Math.max(0,(parseInt(v,10)||0)-1);return String(x);})} style={{width:64,height:64,borderRadius:14,border:`1px solid ${T.border}`,background:'rgba(255,255,255,.05)',color:T.t1,fontSize:28,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>-</button>
            <div style={{fontSize:48,fontWeight:900,color:T.t1,lineHeight:1,minWidth:80,textAlign:'center'}} className="tn">{val}</div>
            <button onClick={()=>setVal(v=>{const x=Math.min(9999,(parseInt(v,10)||0)+1);return String(x);})} style={{width:64,height:64,borderRadius:14,border:`1px solid ${T.border}`,background:'rgba(255,255,255,.05)',color:T.t1,fontSize:28,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
          </div>
          <div style={{fontSize:11,color: delta === 0 ? T.t3 : (delta > 0 ? '#86efac' : '#fca5a5'),marginTop:6,fontWeight:700}} className="tn">
            {delta === 0 ? '— aucun ecart —' : (delta > 0 ? `+${delta} pcs` : `${delta} pcs`)}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:10}}>
          {keys.map(k => (
            <button key={k} onClick={()=>tap(k)} style={{
              padding:'14px 0',borderRadius:11,border:`1px solid ${T.border}`,
              background: k==='c' || k==='del' ? 'rgba(255,255,255,.02)' : T.card,
              color: k==='c' || k==='del' ? T.t2 : T.t1,
              fontSize:18,fontWeight:800,
            }} className="tn">{k === 'del' ? '⌫' : k === 'c' ? 'C' : k}</button>
          ))}
        </div>
        <button disabled={!valid} onClick={()=>{ onConfirm(n); }} style={{
          width:'100%',padding:'14px',borderRadius:12,border:'none',
          background: valid ? '#fff' : 'rgba(255,255,255,.08)',
          color: valid ? '#000' : T.t3,
          fontSize:14,fontWeight:800,letterSpacing:.3,
        }}>Valider · {valid ? n : '—'} pcs</button>
      </div>
    </Sheet>
  );
}

// ── ConfirmSheet (post-action enrichi) ────────────────────────
function ConfirmSheet({ info, onClose, onUndo, onHome, onNext, tourZone }) {
  const [count, setCount] = useState(10);
  const [undone, setUndone] = useState(false);
  useEffect(() => {
    if (count <= 0) return;
    const t = setTimeout(() => setCount(c => c-1), 1000);
    return () => clearTimeout(t);
  }, [count]);
  const a = _artByCode.get(info.code);
  return (
    <Sheet onClose={onClose} title="Action enregistrée">
      <div style={{padding:'4px 14px 0'}}>
        <div style={{textAlign:'center',padding:'14px 0 18px'}}>
          <div style={{width:64,height:64,borderRadius:99,background:'rgba(34,197,94,.18)',color:'#22c55e',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto',animation:'pop .25s ease'}}>
            <Ico d={ICONS.check} s={32} sw={3} />
          </div>
          <div style={{fontSize:15,fontWeight:800,color:T.t1,marginTop:12}}>{info.label}</div>
          {a && <div style={{fontSize:11,color:T.t3,marginTop:2}} className="tn">{info.code} · {a.lib}</div>}
        </div>

        {!undone && count > 0 && (
          <button onClick={()=>{ setUndone(true); onUndo(); }} style={{
            width:'100%',padding:'13px',borderRadius:12,border:'1px solid rgba(251,191,36,.4)',
            background:'rgba(251,191,36,.08)',color:'#fbbf24',fontSize:13,fontWeight:800,
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:8,
          }}>
            <span>Annuler</span>
            <span style={{fontSize:11,opacity:.75}} className="tn">{count}s</span>
          </button>
        )}
        {onNext ? (
          <button onClick={onNext} style={{
            width:'100%',padding:'14px',borderRadius:12,border:'none',
            background:T.accent,color:'#1a0e05',fontSize:14,fontWeight:900,letterSpacing:.3,
          }}>Suivant · zone {tourZone} →</button>
        ) : (
          <button onClick={onHome} style={{
            width:'100%',padding:'14px',borderRadius:12,border:'none',
            background:'#fff',color:'#000',fontSize:14,fontWeight:800,letterSpacing:.3,
          }}>{count > 0 ? 'OK · retour à l\u2019accueil' : 'Retour à l\u2019accueil'}</button>
        )}
        <button onClick={onHome} style={{
          width:'100%',marginTop:6,padding:'12px',borderRadius:12,border:'none',
          background:'transparent',color:T.t2,fontSize:12,fontWeight:600,
        }}>{onNext ? 'Retour à l\u2019accueil' : 'Rester sur la fiche'}</button>
      </div>
    </Sheet>
  );
}

// ── Inventaire — liste de zone ────────────────────────────────
function InvListScreen({ zone, codes, counts, onPick, onExit, onScan, onSummary }) {
  const items = codes.map(c => {
    const a = _artByCode.get(c); if (!a) return null;
    const n = counts[c];
    const counted = n != null;
    const ecart = counted ? n - a.stock : null;
    return { a, n, counted, ecart };
  }).filter(Boolean);
  const done = items.filter(i=>i.counted).length;
  const ecarts = items.filter(i=>i.counted && i.ecart !== 0).length;
  const remaining = items.length - done;
  const pct = (done/items.length)*100;
  return (
    <>
      <div style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:10,background:'#16301f',borderBottom:`1px solid ${T.border}`,minHeight:52}}>
        <button onClick={onExit} style={btnIcon()}><Ico d={ICONS.back} /></button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'baseline',gap:6}}>
            <span style={{fontSize:9,color:'#86efac',fontWeight:800,letterSpacing:.6,textTransform:'uppercase'}}>Inventaire</span>
            <span style={{fontSize:14,fontWeight:800,color:T.t1}}>Zone {zone}</span>
          </div>
          <div style={{fontSize:10,color:T.t2,marginTop:2}} className="tn">{done}/{items.length} comptés · {ecarts} écart{ecarts>1?'s':''}</div>
        </div>
        <button onClick={onExit} style={{padding:'6px 10px',borderRadius:8,border:'1px solid rgba(255,255,255,.1)',background:'transparent',color:'#fca5a5',fontSize:11,fontWeight:700}}>Sortir</button>
      </div>

      <div style={{padding:'8px 14px',background:'#0a0c10',borderBottom:`1px solid ${T.border}`}}>
        <div style={{height:6,background:'rgba(0,0,0,.5)',borderRadius:99}}>
          <div style={{height:'100%',width:pct+'%',background:'#22c55e',borderRadius:99,transition:'width .3s'}} />
        </div>
      </div>

      <div style={{flex:1,padding:'12px 14px',overflow:'auto'}}>
        <div style={sectionLabel}>À compter ({remaining})</div>
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
          {items.filter(i=>!i.counted).map(({a}) => (
            <button key={a.code} onClick={()=>onPick(a.code)} style={invRow(T.card, T.border)}>
              <div style={{width:32,height:32,borderRadius:9,background:'rgba(255,255,255,.04)',color:T.t3,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,fontWeight:800}}>○</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{a.code} · {a.empl}</div>
                <div style={{fontSize:13,fontWeight:600,color:T.t1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:T.t3}}>ERP</div>
                <div style={{fontSize:16,fontWeight:800,color:T.t2}} className="tn">{a.stock}</div>
              </div>
            </button>
          ))}
          {remaining === 0 && <div style={{padding:'20px',textAlign:'center',color:T.t3,fontSize:12}}>✓ Toute la zone est comptée</div>}
        </div>

        {done > 0 && (
          <>
            <div style={sectionLabel}>Comptés ({done})</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,paddingBottom:90}}>
              {items.filter(i=>i.counted).map(({a, n, ecart}) => {
                const ok = ecart === 0;
                const c = ok ? '#22c55e' : '#fbbf24';
                return (
                  <button key={a.code} onClick={()=>onPick(a.code)} style={invRow(ok?'rgba(34,197,94,.06)':'rgba(251,191,36,.08)', ok?'rgba(34,197,94,.2)':'rgba(251,191,36,.3)')}>
                    <div style={{width:32,height:32,borderRadius:9,background:c+'22',color:c,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16,fontWeight:900}}>{ok?'✓':'⚠'}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{a.code} · {a.empl}</div>
                      <div style={{fontSize:13,fontWeight:600,color:T.t1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:10,color:T.t3}} className="tn">ERP {a.stock}</div>
                      <div style={{fontSize:16,fontWeight:800,color:c}} className="tn">{n}{ecart!==0 && <span style={{fontSize:10,marginLeft:4}}>({ecart>0?'+':''}{ecart})</span>}</div>
                    </div>
                  </button>
                );
              })}

          </>

      </div>

      <div style={{padding:'8px 14px calc(14px + env(safe-area-inset-bottom))',background:T.bg,borderTop:`1px solid ${T.border}`,display:'flex',gap:8}}>
        <button onClick={onScan} style={{
          width:54,height:50,borderRadius:14,border:'none',background:T.accent,color:'#1a0e05',
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
        }}>
          <Ico d={ICONS.scan} s={20} sw={2.5} />
        </button>
        <button onClick={onSummary} disabled={done===0} style={{
          flex:1,padding:'14px',borderRadius:14,border:'none',
          background: done===0 ? 'rgba(255,255,255,.06)' : '#22c55e',
          color: done===0 ? T.t3 : '#06200f',
          fontSize:14,fontWeight:800,letterSpacing:.3,
        }}>{done===0 ? 'Compter pour terminer' : `Terminer · ${ecarts} correction${ecarts>1?'s':''}`}</button>
      </div>
    </>
  );
}
const invRow = (bg, border) => ({

});

// ── Inventaire — bilan ────────────────────────────────────────
function InvSummaryScreen({ zone, codes, counts, extras={}, onBack, onPush, onPick, onValidExtras, onRemoveExtra }) {
  // Tri croissant par code, comme dans scan.js
  const sortedCodes = [...codes].sort((a,b)=>a.localeCompare(b));
  const expected = sortedCodes.map(c => _artByCode.get(c)).filter(Boolean);
  const scanned = expected.filter(a => counts[a.code] != null).map(a => ({ a, n: counts[a.code], ecart: counts[a.code] - a.stock }));
  const nonScanned = expected.filter(a => counts[a.code] == null);
  const corrections = scanned.filter(i=>i.ecart !== 0);
  const corrected = scanned.filter(i=>i.ecart === 0);
  const items = scanned;
  const valDelta = corrections.reduce((s,i)=>s + i.ecart * i.a.prix, 0);
  const extrasList = Object.keys(extras).map(c => {
    const a = _artByCode.get(c); if (!a) return null;
    return { a, n: extras[c] };
  }).filter(Boolean).sort((x,y)=>x.a.code.localeCompare(y.a.code));
  return (
    <>
      <TopBar title="Bilan inventaire" sub={`Zone ${zone} · ${items.length} article${items.length>1?'s':''} comptés`} back onBack={onBack} onMenu={()=>{}} />
      <div style={{flex:1,overflow:'auto',padding:'12px 14px 100px'}}>

        <div className="pop" style={{padding:'14px 16px',background:T.card,borderRadius:16,border:`1px solid ${T.border}`,marginBottom:14}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
            <div>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Vérifiés</div>
              <div style={{fontSize:22,fontWeight:900,color:'#86efac',marginTop:2}} className="tn">{items.length}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>/ {codes.length}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Non vér.</div>
              <div style={{fontSize:22,fontWeight:900,color:'#fca5a5',marginTop:2}} className="tn">{nonScanned.length}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>absents</div>
            </div>
            <div>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Écarts</div>
              <div style={{fontSize:22,fontWeight:900,color:'#fbbf24',marginTop:2}} className="tn">{corrections.length}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}} className="tn">{valDelta>=0?'+':''}{valDelta.toFixed(0)}€</div>
            </div>
            <div>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Attendus</div>
              <div style={{fontSize:22,fontWeight:900,color:T.t1,marginTop:2}} className="tn">{codes.length}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>ERP</div>
            </div>
          </div>
        </div>

        {extrasList.length > 0 && (
          <>
            <div style={{...sectionLabel, color:'#fb923c', display:'flex', alignItems:'center', gap:8}}>
              <span style={{flex:1}}>Changer emplacement ({extrasList.length})</span>
              <button onClick={onValidExtras} style={{padding:'4px 10px',borderRadius:6,border:'none',background:'#22c55e',color:'#06200f',fontSize:10,fontWeight:800,cursor:'pointer'}}>Tous corrigés ✓</button>

            <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:14}}>

                    background:'rgba(251,146,60,.06)',borderRadius:10,
                    border:'1px solid rgba(251,146,60,.3)',color:T.t1,textAlign:'left',
                  }}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:800,letterSpacing:.5}} className="tn">{a.code}</div>
                      <div style={{fontSize:11,color:T.t3,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>

function EmplacementSheet({ code, onClose, onPick }) {
  const a = _artByCode.get(code);
  const [val, setVal] = useState('');
  const [scanning, setScanning] = useState(false);
  const allEmpl = [...new Set(ARTICLES.map(x=>x.empl))];
  const allee = a.empl.split('-')[0];
  const nearby = allEmpl.filter(e => e !== a.empl && e.startsWith(allee));
  const others = allEmpl.filter(e => e !== a.empl && !e.startsWith(allee));
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const scanScan = async () => {
    if (scanning) { // stop
      if (streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current = null; }
      setScanning(false); return;
    }
    setScanning(true);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment', width:{ideal:1280} } });
      streamRef.current = stream;
      const v = videoRef.current; if (!v) { setScanning(false); return; }
      v.srcObject = stream; v.play();
      const detect = async () => {
        if (!streamRef.current) return;
        if (typeof BarcodeDetector !== 'undefined') {
          const bd = new BarcodeDetector({ formats:['code_128','code_39','ean_13','ean_8','qr_code'] });
          const res = await bd.detect(v).catch(()=>[]);
          if (res.length > 0) {
            const raw = res[0].rawValue.toUpperCase().trim();
            setVal(raw);
            streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current = null;
            setScanning(false); return;
          }
        }
        if (streamRef.current) requestAnimationFrame(detect);
      };
      v.onloadedmetadata = () => detect();
    } catch(e) { setScanning(false); }
  };
  useEffect(() => () => { if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); }, []);
  const isValid = val && val !== a.empl;
  return (
    <Sheet onClose={onClose} title="Modifier emplacement">
      <div style={{padding:'4px 14px 0'}}>
        <div style={{padding:'12px 14px',background:'rgba(255,255,255,.03)',borderRadius:12,border:`1px solid ${T.border}`,marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Actuel</div>
            <div style={{fontSize:20,fontWeight:800,color:T.t2,marginTop:2}} className="tn">{a.empl}</div>
          </div>
          <div style={{fontSize:22,color:T.t3,fontWeight:300}}>→</div>
          <div style={{flex:1,textAlign:'right'}}>
            <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Nouveau</div>
            <div style={{fontSize:20,fontWeight:800,color:isValid?'#fb923c':T.t3,marginTop:2}} className="tn">{val || '—'}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input value={val} onChange={e=>setVal(e.target.value.toUpperCase())} placeholder="Ex: B12-A2" style={{
            flex:1,padding:'12px 14px',background:'#0a0c10',border:`1px solid ${T.border}`,borderRadius:11,
            color:T.t1,fontSize:14,fontWeight:700,letterSpacing:.5,fontFamily:'inherit',outline:'none',
          }} className="tn" />
          <button onClick={scanScan} style={{
            width:48,padding:0,borderRadius:11,border:`1px solid ${scanning?T.accent:T.border}`,
            background:scanning?'rgba(251,146,60,.15)':T.card,color:T.accent,display:'flex',alignItems:'center',justifyContent:'center',
          }} title="Scanner l'étiquette de rayon">
            <Ico d={ICONS.scan} s={20} sw={2.5} />
          </button>
        </div>

        {scanning && <div style={{borderRadius:12,overflow:'hidden',marginBottom:10,border:`2px solid ${T.accent}`,position:'relative',maxHeight:120}}>
          <video ref={videoRef} muted playsInline style={{width:'100%',display:'block',borderRadius:10,objectFit:'cover',height:120}} />
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
            <div style={{width:'60%',height:2,background:T.accent,opacity:.6,borderRadius:1}} />
          </div>
        </div>}

        <button onClick={()=>isValid && onPick(val)} disabled={!isValid} style={{
          width:'100%',padding:'14px',borderRadius:12,border:'none',
          background: !isValid ? 'rgba(255,255,255,.06)' : T.accent,
          color: !isValid ? T.t3 : '#1a0e05',
          fontSize:14,fontWeight:800,letterSpacing:.3,marginBottom:14,
        }}>{isValid ? `Déplacer · ${a.empl} → ${val}` : 'Saisir un emplacement'}</button>

        {(() => {
          const q = val.toUpperCase();
          const filtered = q ? allEmpl.filter(e => e !== a.empl && e.toUpperCase().includes(q)) : nearby;
          const label = q ? `${filtered.length} résultat${filtered.length>1?'s':''}` : `Allée ${allee} · voisins`;
          return filtered.length > 0 ? (
            <>
              <div style={sectionLabel}>{label}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
                {filtered.slice(0,30).map(e => (
                  <button key={e} onClick={()=>setVal(e)} style={emplChip(val===e)}>{e}</button>
                ))}
                {filtered.length > 30 && <span style={{fontSize:10,color:T.t3,padding:'4px 8px'}}>+{filtered.length-30}</span>}
              </div>
            </>
          ) : null;
        })()}

        {!val && others.length > 0 && (
          <>
            <div style={sectionLabel}>Autres allées</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
              {others.map(e => (
                <button key={e} onClick={()=>setVal(e)} style={emplChip(val===e)}>{e}</button>
              ))}
            </div>
          </>
        )}
      </div>
    </Sheet>
  );
}

function PCApp() {
  const [, bump] = useState(0);
  useEffect(() => {
    const h = () => bump(v => v + 1);
    window.addEventListener('prisme-data', h);
    return () => window.removeEventListener('prisme-data', h);
  }, []);
  const [code, setCode] = useState(null);
  const [q, setQ] = useState('');
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('prisme_pc_hist')||'[]'); } catch(e){ return []; }
  });
  useEffect(()=>{ try{ localStorage.setItem('prisme_pc_hist', JSON.stringify(history.slice(0,50))); }catch(e){} }, [history]);
  const [historyOpen, setHistoryOpen] = useState(true);
  const [unknown, setUnknown] = useState(null);
  const [flashKey, setFlashKey] = useState(0);
  const [scannerActive, setScannerActive] = useState(false);
  const inputRef = useRef(null);
  const scanBuf = useRef({ chars: '', tStart: 0, tLast: 0 });
  const scannerTimer = useRef(null);

  // Refocus input
  useEffect(() => {
    const r = () => {
      const el = document.activeElement;
      if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable)) return;
      inputRef.current?.focus();
    };
    r();
    const i = setInterval(r, 800);
    window.addEventListener('click', r);
    return () => { clearInterval(i); window.removeEventListener('click', r); };
  }, []);

  // Douchette detection
  useEffect(() => {
    const onKey = (e) => {
      const now = performance.now();
      const buf = scanBuf.current;
      if (e.key.length === 1) {
        if (now - buf.tLast > 80) { buf.chars = e.key; buf.tStart = now; }
        else buf.chars += e.key;
        buf.tLast = now;
        if (buf.chars.length >= 4 && (now - buf.tStart) / buf.chars.length < 25) {
          setScannerActive(true);
          clearTimeout(scannerTimer.current);
          scannerTimer.current = setTimeout(() => setScannerActive(false), 1500);
        }
      } else if (e.key === 'Enter') {
        buf.chars = ''; buf.tStart = 0;
      }
      if (e.key === 'Escape') { setCode(null); setQ(''); setUnknown(null); inputRef.current?.focus(); }
    };
    window.addEventListener('keydown', onKey, true);
    return () => window.removeEventListener('keydown', onKey, true);
  }, []);

  const lookup = (raw) => {
    const trimmed = String(raw||'').trim();
    if (!trimmed) return;
    // Code exact (6 chiffres, EAN, ref fournisseur)
    let c = findArt(trimmed);
    // Sinon prendre le 1er résultat de la recherche texte
    if (!c && results.length > 0) c = results[0].code;
    if (c) {
      setCode(c);
      setQ('');
      setUnknown(null);
      setFlashKey(k=>k+1);
      const wasScan = scannerActive || /^\d{6,14}$/.test(trimmed);
      setHistory(h => {
        const filtered = h.filter(x => x.code !== c);
        return [{code:c, ts:Date.now(), mode: wasScan ? 'scan':'search'}, ...filtered].slice(0,50);
      });
    } else {
      setUnknown(trimmed);
      setCode(null);
    }
    inputRef.current?.focus();
  };

  const onSubmit = (e) => { e?.preventDefault(); if (q.trim()) lookup(q); };

  const results = useMemo(() => {
    const s = q.trim();
    if (!s) return [];
    const words = s.toLowerCase().split(/\s+/).filter(w=>w.length>=2);
    if (!words.length) return [];
    return ARTICLES.filter(a => {
      const hay = `${a.code} ${a.lib} ${a.empl} ${a.fam} ${a.marque||''} ${a.refFourn||''}`.toLowerCase();
      return words.every(w => hay.includes(w));
    }).slice(0,12);
  }, [q]);

  const article = code ? _artByCode.get(code) : null;

  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',background:T.bg,color:T.t1,fontSize:14}}>
      {/* Top bar */}
      <div style={{height:54,padding:'0 20px',display:'flex',alignItems:'center',gap:18,borderBottom:`1px solid ${T.border}`,background:'#0d1016',flexShrink:0}}>
        <div style={{fontSize:14,fontWeight:900,letterSpacing:1.5,color:T.t1}}>PRISME</div>
        <div style={{padding:'3px 10px',borderRadius:6,background:T.card,fontSize:11,fontWeight:700,letterSpacing:.5,color:T.accent}}>{CTX.agency}</div>
        <div style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{ARTICLES.length.toLocaleString('fr-FR')} refs</div>
        <div style={{flex:1}} />
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 11px',borderRadius:99,background:scannerActive?'rgba(251,146,60,.15)':T.card,border:`1px solid ${scannerActive?T.accent:T.border}`,transition:'all .2s'}}>
          <div style={{width:7,height:7,borderRadius:99,background:scannerActive?T.accent:'#5b6473',animation:scannerActive?'pulseDot 1s infinite':'none'}} />
          <span style={{fontSize:11,fontWeight:700,color:scannerActive?T.accent:T.t2,letterSpacing:.3}}>
            {scannerActive ? 'Douchette detectee' : 'Douchette prete'}
          </span>
        </div>
        <button onClick={()=>setHistoryOpen(o=>!o)} style={{...btnIcon(true),width:'auto',height:32,padding:'0 12px',gap:6,fontSize:12,fontWeight:700,color:T.t2}}>
          <Ico d={ICONS.scan} s={14} sw={2.5} />
          <span>Historique · {history.length}</span>
        </button>
      </div>

      {/* Body */}
      <div style={{flex:1,display:'flex',minHeight:0,overflow:'hidden'}}>
        {/* Left: scan input + live results */}
        <div style={{width:540,flexShrink:0,borderRight:`1px solid ${T.border}`,display:'flex',flexDirection:'column',background:'#0c0f15'}}>
          <form onSubmit={onSubmit} style={{padding:'18px 18px 14px',borderBottom:`1px solid ${T.border}`}}>
            <div style={{fontSize:9,color:T.t3,fontWeight:800,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Scanner ou rechercher</div>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'0 14px 0 16px',background:T.card,borderRadius:14,border:`2px solid ${q?T.accent:T.border}`,height:60,transition:'border-color .15s'}}>
              <Ico d={scannerActive?ICONS.scan:ICONS.search} s={20} sw={2.5} />
              <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} autoFocus
                placeholder="Code · libelle · EAN · ref four..."
                style={{flex:1,background:'none',border:'none',color:T.t1,fontSize:18,fontWeight:q?800:500,outline:'none',letterSpacing:q?.5:0,fontVariantNumeric:'tabular-nums'}} />
              {q && <button type="button" onClick={()=>{setQ('');inputRef.current?.focus();}} style={{background:'none',border:'none',color:T.t3,fontSize:22,cursor:'pointer',padding:'4px 4px'}}>X</button>}
              <button type="submit" disabled={!q.trim()} style={{height:42,padding:'0 14px',borderRadius:9,border:'none',background:q.trim()?T.accent:T.border,color:q.trim()?'#1a0e05':T.t3,fontSize:12,fontWeight:800,cursor:q.trim()?'pointer':'default',letterSpacing:.5}}>Enter</button>
            </div>
            <div style={{fontSize:10,color:T.t3,marginTop:8,display:'flex',gap:14,fontWeight:600}}>
              <span><kbd style={kbd}>Enter</kbd> ouvrir</span>
              <span><kbd style={kbd}>Esc</kbd> effacer</span>
              <span style={{marginLeft:'auto',color:scannerActive?T.accent:T.t3}}>douchette auto</span>
            </div>
          </form>

          <div style={{flex:1,overflow:'auto',padding:'10px 12px 16px'}}>
            {!q.trim() && (
              <>
                <div style={{...sectionLabel,padding:'4px 6px'}}>Recents · {history.length}</div>
                {history.length === 0 && (
                  <div style={{padding:'40px 16px',textAlign:'center',color:T.t3,fontSize:12}}>
                    Pointe la douchette ou tape un code.
                  </div>
                )}
                {history.slice(0,15).map(h => {
                  const a = _artByCode.get(h.code); if (!a) return null;
                  const v = VC[a.verdict];
                  const t = new Date(h.ts);
                  const tStr = t.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
                  return (
                    <button key={h.ts} onClick={()=>{setCode(h.code);inputRef.current?.focus();}} style={{
                      width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                      background:code===h.code?T.card2:'transparent',borderRadius:10,border:'none',
                      borderLeft:`3px solid ${v.edge}`,color:T.t1,textAlign:'left',marginBottom:3,cursor:'pointer',
                    }}>
                      <span title={h.mode==='scan'?'douchette':'recherche'} style={{fontSize:11,color:T.t3}}>{h.mode==='scan'?'S':'R'}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{a.code} · {tStr}</div>
                        <div style={{fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>
                      </div>
                      <div style={{fontSize:15,fontWeight:800,color:v.fg}} className="tn">{a.stock}</div>
                    </button>
                  );
                })}
              </>
            )}
            {q.trim() && results.length === 0 && (
              <div style={{padding:'40px 16px',textAlign:'center',color:T.t2,fontSize:13}}>
                Aucun resultat pour "{q}"
              </div>
            )}
            {q.trim() && results.length > 0 && (
              <>
                <div style={{...sectionLabel,padding:'4px 6px'}}>{results.length} resultat{results.length>1?'s':''}</div>
                {results.map(a => {
                  const v = VC[a.verdict];
                  return (
                    <div key={a.code} className="pop" style={{
                      position:'relative',display:'flex',alignItems:'stretch',gap:0,
                      background:T.card,borderRadius:10,border:`1px solid ${T.border}`,
                      borderLeft:`3px solid ${v.edge}`,marginBottom:5,overflow:'hidden',
                    }}>
                      <button onClick={()=>{setCode(a.code);setQ('');setHistory(h=>[{code:a.code,ts:Date.now(),mode:'search'},...h.filter(x=>x.code!==a.code)].slice(0,50));}} style={{
                        flex:1,display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                        background:'none',border:'none',color:T.t1,textAlign:'left',cursor:'pointer',minWidth:0,
                      }}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,color:T.t2,fontWeight:800,letterSpacing:.8}} className="tn">{a.code}</div>
                          <div style={{fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',color:T.t1,marginTop:2}}>{a.lib}</div>
                          <div style={{fontSize:10,color:T.accent,fontWeight:600,marginTop:1}}>{a.empl}<span style={{color:T.t3,fontWeight:400,marginLeft:6}}>{a.marque}</span></div>
                        </div>
                        <div style={{textAlign:'right'}}>
                          <div style={{fontSize:18,fontWeight:800,color:v.fg,lineHeight:1}} className="tn">{a.stock}</div>
                          <div style={{fontSize:9,color:T.t3,marginTop:2}} className="tn">{a.min}/{a.max}</div>
                        </div>
                      </button>
                      <CopyBtn code={a.code} />
                      <a href={`http://www.legallais.com/article/${a.code}`} target="_blank" rel="noopener" title="Voir sur legallais.com" onClick={e=>e.stopPropagation()} style={{
                        width:36,borderLeft:`1px solid ${T.border}`,background:'rgba(255,255,255,.02)',
                        color:T.t3,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,textDecoration:'none',
                      }}>L</a>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        </div>

        {/* Center: article view */}
        <div key={flashKey} className={article?'scan-flash':''} style={{flex:1,overflow:'auto',padding:'24px 32px'}}>
          {!article && !unknown && DATA_SOURCE === 'loading' && (
            <div style={{maxWidth:720,margin:'8vh auto 0',textAlign:'center',color:T.t2}}>
              <div style={{fontSize:36,fontWeight:900,letterSpacing:-1,color:T.t1,marginBottom:12}}>Chargement...</div>
              <div style={{fontSize:13}}>Connexion a la base articles</div>
            </div>
          )}
          {!article && !unknown && DATA_SOURCE !== 'loading' && <PCEmpty agency={CTX.agency} historyCount={history.length} />}
          {unknown && (
            <div style={{maxWidth:560,margin:'80px auto',padding:'28px',background:T.card,borderRadius:16,border:`1px solid ${T.border}`,textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:800,color:T.t1}}>Code <span style={{color:T.accent,letterSpacing:1}} className="tn">"{unknown}"</span> non trouve</div>
              <div style={{fontSize:13,color:T.t2,marginTop:8}}>Pas dans la base agence ni au catalogue.</div>
              <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:18}}>
                <button onClick={()=>{setUnknown(null);setQ(unknown);inputRef.current?.focus();}} style={pcBtn}>Modifier</button>
                <button onClick={()=>{setUnknown(null);inputRef.current?.focus();}} style={{...pcBtn,background:T.accent,color:'#1a0e05'}}>Rescanner</button>
              </div>
            </div>
          )}
          {article && <PCArticle a={article} onClose={()=>setCode(null)} />}
        </div>

        {/* Right: history panel (collapsible) */}
        {historyOpen && (
          <div style={{width:300,flexShrink:0,borderLeft:`1px solid ${T.border}`,background:'#0c0f15',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'14px 16px',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:11,fontWeight:800,letterSpacing:.6,color:T.t1}}>Historique session</div>
                <div style={{fontSize:10,color:T.t3,marginTop:2}}>{history.length} scan{history.length>1?'s':''}</div>
              </div>
              <button onClick={()=>setHistory([])} disabled={!history.length} style={{background:'none',border:'none',color:history.length?T.t3:'#3a3f4d',fontSize:11,cursor:history.length?'pointer':'default',fontWeight:700}}>Vider</button>
            </div>
            <div style={{flex:1,overflow:'auto',padding:'8px 8px'}}>
              {history.length === 0 && <div style={{padding:'30px 14px',textAlign:'center',color:T.t3,fontSize:11}}>Aucun scan pour le moment.</div>}
              {history.map((h, i) => {
                const a = _artByCode.get(h.code);
                const v = a ? VC[a.verdict] : VC.ok;
                const t = new Date(h.ts);
                const tStr = t.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
                return (
                  <button key={i} onClick={()=>a && setCode(a.code)} style={{
                    width:'100%',display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
                    background:code===h.code?T.card:'transparent',borderRadius:8,border:'none',color:T.t1,textAlign:'left',cursor:'pointer',marginBottom:1,
                  }}>
                    <span style={{fontSize:9,color:T.t3,width:38,fontWeight:600}} className="tn">{tStr}</span>
                    <span style={{width:6,height:6,borderRadius:99,background:v.edge,flexShrink:0}} />
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{h.code}</div>
                      <div style={{fontSize:11,color:T.t1,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a?a.lib:'?'}</div>
                    </div>
                    <span style={{fontSize:9,color:T.t3}}>{h.mode==='scan'?'S':'R'}</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Hint footer */}
      <div style={{height:28,padding:'0 18px',display:'flex',alignItems:'center',gap:18,fontSize:10,color:T.t3,fontWeight:600,background:'#0d1016',borderTop:`1px solid ${T.border}`,flexShrink:0}}>
        <span>Mode PC · {CTX.agency}</span>
        <span><kbd style={kbd}>/</kbd> recherche</span>
        <span><kbd style={kbd}>Esc</kbd> retour</span>
        <span style={{marginLeft:'auto'}}>Le clavier va toujours dans le champ de scan.</span>
      </div>
    </div>
  );
}

if (IS_PC) document.body.classList.add('pc-mode');
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary>{IS_PC ? <PCApp /> : <App />}</ErrorBoundary>);
</script>
</body>
</html>
