  { code:'264850', libelle:'Coffret 7 forets béton SDS+', marque:'Bosch Pro', famille:'Outillage électroportatif', sousFamille:null, _refFourn:null, emplacement:'B12-A1', stockActuel:2, prixMoyenReseau:42.80, txMargeReseau:29, nouveauMin:1, nouveauMax:3, ancienMin:1, ancienMax:3, couvertureJours:48, statut:'Actif', _sqClassif:'socle' },
];

const SQ_LABEL = { socle:'Socle', surveiller:'Surveiller', a_implanter:'À implanter', dormant:'Dormant' };

// Verdict stock — proxy léger de _verdict() côté scan.js (sans W/vitesse pour l'instant).
function _verdict(stock, min, max) {
  if (stock <= 0) return 'rupture';
  if (min > 0 && stock < min) return 'sousmin';
  if (max > 0 && stock > max) return 'surstock';
  return 'ok';
}
function _primary(verdict, stock, min, max) {
  if (verdict === 'rupture')  return { kind:'commander', label:'Commander', qty: Math.max(min, 1), sub:`Stock ${stock} < MIN ${min}` };
  if (verdict === 'sousmin')  return { kind:'commander', label:'Commander', qty: min - stock,     sub:`Stock ${stock} < MIN ${min}` };
  if (verdict === 'surstock') return { kind:'retour',    label:'Retour centrale', qty: stock - max, sub:`${stock - max} pcs au-dessus du MAX` };
  return null;
}
function _secondary(it) {
  const sec = [];
  const min = it.nouveauMin || 0, max = it.nouveauMax || 0;
  const eMin = it.ancienMin || 0, eMax = it.ancienMax || 0;
  // Ne pas surfacer "Corriger ERP" tant que PRISME n'a pas calculé un nouveau min/max
  if ((min > 0 || max > 0) && (eMin !== min || eMax !== max)) {
    sec.push({ kind:'erp', label:'Corriger ERP', sub:`${eMin}/${eMax} → ${min}/${max}` });
  }
  return sec;
}

function loadEngineData(engine) {
  if (!Array.isArray(engine)) return [];
  return engine.map(it => {
    const stock = it.stockActuel ?? 0;
    const min   = it.nouveauMin   ?? 0;
    const max   = it.nouveauMax   ?? 0;
    const eMin  = it.ancienMin    ?? 0;
    const eMax  = it.ancienMax    ?? 0;
    const verdict = _verdict(stock, min, max);
    const fam = it.sousFamille ? `${it.famille || ''} › ${it.sousFamille}` : (it.famille || '—');
    return {
      code:    it.code,
      lib:     it.libelle || '—',
      marque:  it.marque || '',
      fam,
      empl:    it.emplacement || '—',
      stock,
      prix:    it.prixMoyenReseau ?? null,
      marge:   it.txMargeReseau   ?? null,
      min, max, erpMin: eMin, erpMax: eMax,
      refFourn: it._refFourn || null,
      couv:    (it.couvertureJours != null && it.couvertureJours < 9999) ? it.couvertureJours : 0,
      statut:  it.statut || 'Actif',
      verdict,
      sq:      SQ_LABEL[it._sqClassif] || (it._sqVerdict || 'Socle'),
      primary: _primary(verdict, stock, min, max),
      secondary: _secondary(it),
      _raw:    it, // garde l'original sous le coude pour passes futures (W, vitesse, ABC…)
    };
  });
}

// Mutable on purpose : remplacé par hydrateFromIDB() au boot quand dispo.

// ── Associations EAN custom ─────────────────────────────────

}

function removeCustomEan(ean) { _customEanMap.delete(ean); _saveCustomEan(); }
function getCustomEansForCode(code) { return [..._customEanMap.entries()].filter(([,c])=>c===code).map(([ean])=>ean); }

// ── IDB hydrate ──────────────────────────────────────────────
// Lit IndexedDB PRISME (clé 'scan' prioritaire, sinon 'current') comme scan.js.
// Si trouvé : remplace ARTICLES et notifie l'app (custom event 'prisme-data').
function hydrateFromIDB() {
  if (typeof indexedDB === 'undefined') return;
  let req;
  try { req = indexedDB.open('PRISME', 2); } catch (e) { return; }
  req.onerror = () => {};
  req.onupgradeneeded = () => {
    try {
      const db = req.result;
      if (!db.objectStoreNames.contains('session')) db.createObjectStore('session');
    } catch (e) {}
  };
  req.onsuccess = () => {
    const db = req.result;
    if (!db.objectStoreNames.contains('session')) return;
    const tx = db.transaction('session', 'readonly');
    const store = tx.objectStore('session');
    const grab = (key) => new Promise(res => {
      const r = store.get(key); r.onsuccess = () => res(r.result); r.onerror = () => res(null);
    });
    Promise.all([grab('scan'), grab('current')]).then(([scan, current]) => {
      // Charger la table EAN si disponible
      const eanData = scan?.ean || current?.ean;
      if (eanData && typeof eanData === 'object') {
        window._eanMap = new Map(Object.entries(eanData));
        console.log('[Prisme] EAN map · ' + window._eanMap.size + ' entrées');
      }
      const hasLive = current?.finalData?.length > 0;
      // Si session PRISME live → la préférer
      if (hasLive) {
        ARTICLES = loadEngineData(current.finalData);
        DATA_SOURCE = 'idb';
        console.log('[Prisme] IDB session live · ' + ARTICLES.length + ' articles');
        window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'idb' } }));
        return;
      }
      // Sinon essayer le JSON distant
      if (!hasLive) {
        _fetchScanJson().then(ok => {
          if (ok) return;
          // Fallback IDB scan
          const rows = (scan?.articles?.length ? scan.articles
                       : scan?.finalData?.length ? scan.finalData
                       : null);
          if (!rows) { console.log('[Prisme] IDB vide → fallback mock'); return; }
          ARTICLES = loadEngineData(rows);
          DATA_SOURCE = 'idb';
          console.log('[Prisme] IDB scan · ' + ARTICLES.length + ' articles');
          window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'idb' } }));
        });
      }
    });
  };
}

function _fetchScanJson() {
  return fetch('data/index.json', { cache: 'no-cache' }).then(r => r.ok ? r.json() : null).then(files => {
    if (!files) return false;
    const f = files.find(n => n.startsWith('prisme-scan-') && n.endsWith('.json'));
    if (!f) return false;
    return fetch('data/' + f, { cache: 'no-cache' }).then(r => r.ok ? r.json() : null).then(data => {
      const rows = data?.articles || data?.finalData;
      if (!rows?.length) return false;
      if (data?.ean && typeof data.ean === 'object') {
        window._eanMap = new Map(Object.entries(data.ean));
        console.log('[Prisme] EAN map JSON · ' + window._eanMap.size + ' entrées');
      }
      ARTICLES = loadEngineData(rows);
      DATA_SOURCE = 'json';
      const m = f.match(/prisme-scan-(.+)\.json/);
      if (m) CTX.agency = m[1];
      CTX.greeting = CTX.agency;
      console.log('[Prisme] JSON · ' + ARTICLES.length + ' articles depuis data/' + f);
      window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'json' } }));
      return true;
    });
  }).catch(() => false);
}

hydrateFromIDB();

    const entry = { id, kind, label, dest, eta, ts:Date.now(), status:'pending' };
    setActions(a => ({...a, [code]: [...(a[code]||[]), entry]}));
    setSheet({ type:'confirm', code, id, label, dest, eta });
  };
  const validateAction = (code, id) => {
    setActions(a => {
      const next = {...a};
      next[code] = (next[code]||[]).map(x => x.id === id ? {...x, status:'validee'} : x);
      return next;
    });
  };
  const undoAction = (code, id) => {
    setActions(a => {
      const next = {...a};
      next[code] = (next[code]||[]).filter(x => x.id !== id);
      if (next[code].length === 0) delete next[code];
      return next;
    });
    showToast('Action annulée');
  };
  const enterInv = () => {
    if (invMode && invZone) { setPage('invList'); showToast(`Reprise · zone ${invZone}`); }
    else { setSheet('zone'); }
  };
  const exitInv = () => { setPage('home'); showToast('Inventaire suspendu — reprise possible'); };
  const cancelInv = () => { setInvMode(false); setInvZone(null); setInvCounts({}); setInvExtras({}); setPage('home'); showToast('Inventaire abandonné'); };
  const pushInv = () => {
    const ecarts = INV_CODES.filter(c => {
      const a = ARTICLES.find(x=>x.code===c); const n = invCounts[c];
      return a && n != null && n !== a.stock;
    });
    setInvMode(false); setInvZone(null); setInvCounts({}); setPage('home');
    showToast(`✓ ${ecarts.length} correction${ecarts.length>1?'s':''} envoyée${ecarts.length>1?'s':''} à l'ERP`);
  };
  const totalActions = Object.values(actions).reduce((n,a)=>n+a.length,0);
  const pendingActions = Object.values(actions).reduce((n,a)=>n+a.filter(x=>x.status==='pending').length,0);
  const invDoneCount = INV_CODES.filter(c => invCounts[c] != null).length;

  return (
    <>
      {page === 'home' && <HomeScreen
        t={t}
        onSearch={()=>setPage('search')}
        onScan={()=>{ setScanContinu(true); setSheet('camera'); }}
        onScanDirect={()=>{ setScanContinu(false); setSheet('camera'); }}
        onArticle={openArticle}
        onInv={enterInv}
        onDouchette={()=>{ setPage('douchette'); }}
        invMode={invMode}
        onInvOpen={()=>setPage('invList')}
        onInvExit={exitInv}
        invDoneCount={invDoneCount}
        invTotal={INV_CODES.length}
        invZone={INV_ZONE}
        recents={recents}
        actionsCount={pendingActions}
        validatedCount={Object.values(actions).reduce((n,a)=>n+a.filter(x=>x.status==='validee').length,0)}
        onActions={()=>setSheet('todo')}
        onMenu={()=>setSheet('menu')}
      />}
      {page === 'douch_dummy_marker' && null}
      {page === 'douchette' && <DouchetteScreen onBack={goHome} onArticle={openArticle} />}

      {page === 'search' && <SearchScreen
        onClose={goHome}
        onPick={openArticle}
        onScan={()=>{ setScanContinu(false); setSheet('camera'); }}
      />}
      {page === 'article' && (() => {
        const articleInInv = invMode && articleCode && INV_CODES.includes(articleCode);
        return <ArticleScreen
        t={t}
        code={articleCode}
        onBack={articleInInv ? ()=>setPage('invList') : goHome}
        onActions={()=>setSheet('actions')}
        onScan={()=>{ setScanContinu(false); setSheet('camera'); }}
        addedActions={actions[articleCode]||[]}
        invMode={articleInInv}
        invDoneCount={invDoneCount}
        invTotal={INV_CODES.length}
        invZone={INV_ZONE}
        invCurrentCount={invCounts[articleCode]}
        onInvOpen={()=>setPage('invList')}
        onInvExit={exitInv}
        onInvCount={(n)=>{ setInvCounts(c=>({...c,[articleCode]:n})); setTimeout(()=>setPage('invList'), 350); }}
        onActionsCount={pendingActions}
        onTodo={()=>setSheet('todo')}
      />;
      })()}

      {page === 'invList' && <InvListScreen
        zone={INV_ZONE}
        codes={INV_CODES}
        counts={invCounts}
        onPick={openArticle}
        onExit={exitInv}
        onScan={()=>{ invScanFromInvRef.current = true; setScanContinu(false); setSheet('camera'); }}
        onSummary={()=>setPage('invSummary')}
      />}

      {page === 'invSummary' && <InvSummaryScreen
        zone={INV_ZONE}
        codes={INV_CODES}
        counts={invCounts}
        extras={invExtras}
        onBack={()=>setPage('invList')}
        onPush={pushInv}
        onPick={openArticle}
        onValidExtras={()=>{
          const codes = Object.keys(invExtras);
          codes.forEach(c => { const a = ARTICLES.find(x=>x.code===c); if (a) a.empl = invZone; });
          showToast(`✓ ${codes.length} emplacement${codes.length>1?'s':''} corrigé${codes.length>1?'s':''}`);
          setInvExtras({});
        }}
      />}

      {sheet === 'actions' && articleCode && <ActionsSheet
        code={articleCode}
        existing={actions[articleCode]||[]}
        onClose={()=>setSheet(null)}
        onAdd={(k,l,d,e)=>{
          if (k === 'stock') { setSheet({type:'stockedit', code:articleCode}); return; }
          if (k === 'emp') { setSheet({type:'empedit', code:articleCode}); return; }
          addAction(articleCode,k,l,d,e);
        }}
      />}
      {sheet?.type === 'stockedit' && <StockEditSheet
        code={sheet.code}
        onClose={()=>setSheet(null)}
        onConfirm={(newStock)=>{
          const a = ARTICLES.find(x=>x.code===sheet.code);
          addAction(sheet.code, 'stock', `Modifier le stock (${a.stock} → ${newStock})`, 'ERP central · sync', '≤ 5 min');
        }}
      />}
      {sheet?.type === 'empedit' && <EmplacementSheet
        code={sheet.code}
        onClose={()=>setSheet(null)}
        onPick={(newEmpl)=>{
          const a = ARTICLES.find(x=>x.code===sheet.code);
          addAction(sheet.code, 'emp', `Modifier emplacement (${a.empl} → ${newEmpl})`, 'ERP central', 'Immédiat');
        }}
      />}
      {sheet?.type === 'confirm' && <ConfirmSheet
        info={sheet}
        onClose={()=>setSheet(null)}
        onUndo={()=>{ undoAction(sheet.code, sheet.id); setSheet(null); }}
        onHome={()=>{ setSheet(null); goHome(); }}
      />}
      {sheet === 'zone' && <ZonePickerSheet onClose={()=>setSheet(null)} onPick={(z)=>{
        setSheet(null); setInvZone(z); setInvMode(true); setPage('invList'); showToast(`Inventaire · zone ${z}`);
      }} />}
      {sheet === 'menu' && <MenuSheet invMode={invMode} invZone={invZone} onClose={()=>setSheet(null)} onItem={(k)=>{
        setSheet(null);
        if (k === 'inv') { enterInv(); }
        if (k === 'invStop') { if (confirm("Abandonner l'inventaire en cours ? Les comptages seront perdus.")) cancelInv(); }
        if (k === 'ean') { setSheet('ean'); return; }
        if (k === 'sync') { showToast('Synchronisation…'); _fetchScanJson().then(ok => { if (ok) showToast('✓ ' + ARTICLES.length + ' articles synchronisés'); else showToast('✕ Aucun fichier trouvé'); }); }
        if (k === 'purge') { ARTICLES = loadEngineData(ENGINE_DATA); DATA_SOURCE = 'mock'; window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'mock' } })); showToast('Cache purgé'); }
        if (k === 'import') {
          const inp = document.createElement('input');
          inp.type = 'file'; inp.accept = '.json,application/json';
          inp.onchange = () => {
            const f = inp.files?.[0]; if (!f) return;
            const rd = new FileReader();
            rd.onload = () => {
              try {
                const j = JSON.parse(rd.result);
                const rows = Array.isArray(j) ? j
                           : Array.isArray(j.articles) ? j.articles
                           : Array.isArray(j.finalData) ? j.finalData
                           : null;
                if (!rows || !rows.length) { showToast('✕ JSON invalide'); return; }
                ARTICLES = loadEngineData(rows);
                DATA_SOURCE = 'import';
                window.dispatchEvent(new CustomEvent('prisme-data', { detail:{ count: ARTICLES.length, source:'import' } }));
                showToast(`✓ ${ARTICLES.length} articles importés`);
              } catch (e) { showToast('✕ Lecture impossible'); }
            };
            rd.readAsText(f);
          };
          inp.click();
        }
      }} />}
      {sheet === 'camera' && <CameraSheet continu={scanContinu} onClose={()=>setSheet(null)} onPick={(c)=>{
        setSheet(null);
        const fromInv = invScanFromInvRef.current; invScanFromInvRef.current = false;
        if (fromInv && invMode && invZone && !INV_CODES.includes(c) && ARTICLES.find(x=>x.code===c)) {
          const a = ARTICLES.find(x=>x.code===c);
          setInvExtras(e => ({...e, [c]: (e[c] ?? a.stock)}));
          showToast(`📍 Hors zone : ${c} ajouté aux extras`);
          setPage('invList');
        } else { openArticle(c); }
      }} onBatch={(items)=>{
        setSheet(null);
        if (items.length === 0) return;
        // Ajouter tous les articles scannés (pas seulement ceux avec action primaire)
        setActions(prev => {
          const next = {...prev};
          for (const d of items) {
            const a = ARTICLES.find(x=>x.code===d.code);
            if (!a) continue;
            // Si déjà en attente pour cet article, skip
            if (next[d.code]?.some(x=>x.status==='pending')) continue;
            const id = 'a' + Math.random().toString(36).slice(2,8);
            const label = a.primary ? a.primary.label + (a.primary.qty ? ` x${a.primary.qty}` : '') : 'A verifier';
            const kind = a.primary ? a.primary.kind : 'check';
            next[d.code] = [...(next[d.code]||[]), { id, kind, label, dest:'', eta:'', ts:Date.now(), status:'pending' }];
          }
          return next;
        });
        showToast(`${items.length} article${items.length>1?'s':''} ajouté${items.length>1?'s':''} aux actions`);
        setSheet('todo');
      }} onUnknown={(code)=>setSheet({type:'unknown', code})} />}
      {sheet === 'ean' && <EanSheet onClose={()=>setSheet(null)} onPick={(c)=>{ setSheet(null); openArticle(c); }} />}
      {sheet?.type === 'unknown' && <UnknownSheet code={sheet.code} onClose={()=>setSheet(null)} onRetry={()=>setSheet('camera')} onAssoc={(artCode)=>{ setSheet(null); showToast(`EAN associé à ${artCode}`); openArticle(artCode); }} />}
      {sheet === 'todo' && <JournalSheet
        onClose={()=>setSheet(null)}
        actions={actions}
        onPick={(c)=>{ setSheet(null); openArticle(c); }}
        onUndo={undoAction}
        onValidate={validateAction}
        onPush={()=>{
          setActions(prev => {
            const next = {};
            Object.keys(prev).forEach(c => {
              next[c] = prev[c].map(x => x.status==='pending' ? {...x, status:'validee'} : x);
            });
            return next;
          });
          showToast('✓ Toutes les actions synchronisées');
        }}
        onPurge={()=>{
          setActions({});
          setSheet(null);
          showToast('Journal purgé');
        }}
      />}

      {toast && <Toast msg={toast} />}
    </>
  );
}

// ── SEARCH ────────────────────────────────────────────────────
function SearchScreen({ onClose, onPick, onScan }) {
  const [q, setQ] = useState('');
  const inputRef = useRef(null);
  useEffect(() => { setTimeout(()=>inputRef.current?.focus(), 50); }, []);

  const results = useMemo(() => {
    if (!q.trim()) return [];
    const words = q.toLowerCase().split(/\s+/).filter(w=>w.length>=2);
    if (!words.length) return [];
    return ARTICLES.filter(a => {
      const hay = `${a.code} ${a.lib} ${a.empl} ${a.fam} ${a.marque}`.toLowerCase();
      return words.every(w => hay.includes(w));
    }).slice(0,8);
  }, [q]);

  return (
    <>
      <div style={{padding:'8px 12px 6px',display:'flex',alignItems:'center',gap:8,background:T.bg,borderBottom:`1px solid ${T.border}`}}>
        <button onClick={onClose} style={btnIcon()}><Ico d={ICONS.back} /></button>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:8,padding:'0 6px 0 12px',background:T.card,borderRadius:12,border:`1.5px solid ${q?T.accent:T.border}`,height:42}}>
          <Ico d={ICONS.search} s={16} />
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Code, libellé, empl..." autoFocus
            style={{flex:1,background:'none',border:'none',color:T.t1,fontSize:15,fontWeight:q?700:400,outline:'none',letterSpacing:q?.5:0}} className="tn" />
          {q && <button onClick={()=>setQ('')} style={{background:'none',border:'none',color:T.t3,fontSize:18,cursor:'pointer',padding:'4px 8px'}}>✕</button>}
        </div>
        <button onClick={onScan} style={{...btnIcon(),background:T.accent,color:'#1a0e05',width:40,height:40,borderRadius:11}}>
          <Ico d={ICONS.scan} s={18} sw={2.5} />
        </button>
      </div>

      <div style={{flex:1,overflow:'auto',padding:'8px 12px 12px'}}>
        {!q.trim() && (
          <>
            <div style={sectionLabel}>Suggestions</div>
            {['foret béton', 'spax 5x60', 'B12-C3'].map(s => (
              <button key={s} onClick={()=>setQ(s)} style={chipRow()}>
                <Ico d={ICONS.search} s={14} sw={2} />
                <span style={{flex:1,textAlign:'left',fontSize:13}}>{s}</span>
              </button>
            ))}
          </>
        )}
        {q.trim() && results.length === 0 && (
          <div style={{textAlign:'center',padding:'40px 20px',color:T.t2}}>
            <div style={{fontSize:32,marginBottom:8}}>🔍</div>
            <div style={{fontSize:13}}>Aucun résultat pour « {q} »</div>
          </div>
        )}
        {q.trim() && results.length > 0 && (
          <>
            <div style={sectionLabel}>{results.length} résultat{results.length>1?'s':''}</div>
            {results.map(a => {
              const v = VC[a.verdict];

function CameraSheet({ continu=true, onClose, onPick, onBatch, onUnknown }) {
  const [haptic, setHaptic] = useState(true);
  const [unreadable, setUnreadable] = useState(false);
  const [detected, setDetected] = useState([]); // [{...article, count, lastTs, firstTs}]
  const [flash, setFlash] = useState(0); // increment to trigger flash
  const [dupNotice, setDupNotice] = useState(null);
  const [batchOpen, setBatchOpen] = useState(false);

  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const canvasRef = useRef(null);
  const ctxRef = useRef(null);
  const scanTimer = useRef(null);
  const scanPassRef = useRef(0);
  const lastCodesRef = useRef(new Map()); // Map<barcode, ts> anti-doublon brut

  // Résoudre un code-barre scanné → code article PRISME
  const resolveBarcode = (barcode) => {
    const clean = barcode.replace(/\D/g, '');
    // 1) Code article direct (6 chiffres)
    let a = ARTICLES.find(x => x.code === clean);
    if (a) return a.code;
    // 2) Ref fournisseur
    a = ARTICLES.find(x => x.refFourn && (x.refFourn === barcode || x.refFourn === barcode.toUpperCase()));
    if (a) return a.code;
    // 3) Custom EAN (associations terrain)
    const custom = _customEanMap.get(clean);
    if (custom) return custom;
    // 4) EAN via IDB eanMap (chargé globalement)
    if (window._eanMap) {
      const c = window._eanMap.get(clean);
      if (c) return c;
    }
    return null; // inconnu
  };

  const tryAdd = (code, barcode) => {
    const a = ARTICLES.find(x=>x.code===code); if (!a) return;
    const barHint = (barcode && barcode !== code) ? '....' + barcode.slice(-4) : '';
    const now = Date.now();
    setDetected(d => {
      const i = d.findIndex(x => x.code === code);
      if (i >= 0) {
        // Anti-doublon : si <3s, ignore. Sinon, +1 quantité scannée.
        if (now - d[i].lastTs < 3000) {
          setDupNotice({ code, lib: a.lib }); setTimeout(()=>setDupNotice(null), 1400);
          return d;
        }
        const next = [...d];
        next[i] = {...next[i], count: next[i].count + 1, lastTs: now};
        return next;
      }
      return [{...a, count:1, firstTs:now, lastTs:now, barHint}, ...d];
    });
    setFlash(f => f + 1);
    if (haptic && navigator.vibrate) { try { navigator.vibrate(15); } catch(e){} }
  };

  // Boucle de scan caméra
  const scanLoop = async () => {
    const video = videoRef.current;
    if (!video || !streamRef.current) return;
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) { scanTimer.current = setTimeout(scanLoop, 100); return; }

    if (!canvasRef.current) {
      canvasRef.current = document.createElement('canvas');
      ctxRef.current = canvasRef.current.getContext('2d', { willReadFrequently: true });
    }
    const canvas = canvasRef.current, ctx = ctxRef.current;

    // Viewfinder : carré centré 76% largeur
    const VF = 0.76;
    const side = Math.round(Math.min(vw, vh) * VF);
    const cx = Math.round((vw - side) / 2);
    const cy = Math.round((vh - side) / 2);

    // Alterner carré plein / bande laser
    scanPassRef.current++;
    let cw, ch, sy;
    if (scanPassRef.current % 2 === 0) {
      cw = side; ch = side; sy = cy;
    } else {
      const bandH = Math.round(side * 0.15);
      cw = side; ch = bandH; sy = cy + Math.round((side - bandH) / 2);
    }

    canvas.width = cw; canvas.height = ch;
    ctx.drawImage(video, cx, sy, cw, ch, 0, 0, cw, ch);
    const imageData = ctx.getImageData(0, 0, cw, ch);

    try {
      const hasZbar = typeof zbarWasm !== 'undefined';
      const zxingP = (typeof ZXingWASM !== 'undefined')
        ? ZXingWASM.readBarcodes(imageData, {
            tryHarder: true,
            formats: ['EAN-13', 'EAN-8', 'Code128', 'Code39'],
            maxNumberOfSymbols: 4,
          }).then(res => res.map(r => ({ text: r.text, format: r.format })))
        : Promise.resolve([]);

      const zbarP = hasZbar
        ? zbarWasm.scanImageData(imageData).then(symbols =>
            symbols.map(s => ({ text: s.decode(), format: 'ZBar-' + s.typeName }))
          ).catch(() => [])
        : Promise.resolve([]);

      const [zxingRes, zbarRes] = await Promise.all([zxingP, zbarP]);
      const seen = new Set();
      const merged = [];
      for (const r of [...zbarRes, ...zxingRes]) {
        if (!r.text || seen.has(r.text)) continue;
        seen.add(r.text);
        merged.push(r);
      }

      const now = Date.now();
      for (const r of merged) {
        const barcode = r.text;
        if (!/^\d{5,13}$/.test(barcode)) continue;
        // Anti-doublon brut 2s sur le code-barre brut
        const prev = lastCodesRef.current.get(barcode);
        if (prev && now - prev < 2000) continue;
        lastCodesRef.current.set(barcode, now);

        // Résoudre vers un article PRISME
        const artCode = resolveBarcode(barcode);
        if (artCode) {
          if (!continu) {
            // Mode direct : 1 scan → fiche immédiate
            if (navigator.vibrate) try { navigator.vibrate(15); } catch(e){}
            onPick(artCode);
            return; // stop scan loop
          }
          tryAdd(artCode, barcode);
        } else {
          // Code inconnu → notifier le parent
          if (onUnknown) onUnknown(barcode);
        }
      }
    } catch (e) {
      console.warn('[Scan] erreur:', e);
    }

    scanTimer.current = setTimeout(scanLoop, 80); // ~12 fps
  };

  // Démarrer la caméra au montage
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false,
        });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play().then(() => { scanLoop(); });
        }
      } catch (err) {
        console.warn('Camera:', err);
        setUnreadable(true);
      }
    })();
    return () => {
      cancelled = true;
      if (scanTimer.current) clearTimeout(scanTimer.current);
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, []);

  const counts = detected.reduce((acc, x) => {
    if (x.verdict === 'rupture' || x.verdict === 'sousmin') acc.attention++;
    return acc;
  }, { attention: 0 });

  return (
    <div className="sheet-bg" style={{position:'absolute',inset:0,background:'#000',zIndex:100,display:'flex',flexDirection:'column'}}>
      {/* Flash on detect */}
      <div key={flash} style={{position:'absolute',inset:0,background:'rgba(34,197,94,.3)',pointerEvents:'none',zIndex:5,animation: flash > 0 ? 'fadeFlash .35s ease-out forwards' : 'none'}} />

      {/* Flux caméra */}
      <div style={{flex:1,position:'relative',overflow:'hidden',background:'#000'}}>
        <video ref={videoRef} playsInline autoPlay muted style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}} />
        <div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(255,255,255,.02) 2px,rgba(255,255,255,.02) 3px)'}} />
        <div style={{position:'absolute',left:'12%',right:'12%',height:2,background:'linear-gradient(90deg,transparent,#fb923c,transparent)',animation:'scanline 2s ease-in-out infinite',boxShadow:'0 0 20px #fb923c'}} />
        <div style={{position:'absolute',left:'12%',top:'15%',right:'12%',aspectRatio:1,border:'2px solid rgba(255,255,255,.4)',borderRadius:18,boxShadow:'0 0 0 9999px rgba(0,0,0,.55)'}}>
          {['tl','tr','bl','br'].map(p => {
            const s = {position:'absolute',width:24,height:24,borderColor:'#fb923c',borderStyle:'solid',borderWidth:0,
              ...(p[0]==='t'?{top:-3}:{bottom:-3}), ...(p[1]==='l'?{left:-3}:{right:-3}),
              ...(p[0]==='t'?{borderTopWidth:4}:{borderBottomWidth:4}),
              ...(p[1]==='l'?{borderLeftWidth:4}:{borderRightWidth:4}),
            };
            return <div key={p} style={s} />;
          })}
        </div>

        {/* close */}
        <button onClick={onClose} style={{position:'absolute',top:14,left:14,width:38,height:38,borderRadius:99,background:'rgba(0,0,0,.6)',border:'none',color:'#fff',padding:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Ico d={ICONS.close} s={18} sw={2.5} />
        </button>

        {/* Counter pill (top center) */}
        <div style={{position:'absolute',top:14,left:'50%',transform:'translateX(-50%)',display:'flex',alignItems:'center',gap:6,padding:'6px 10px 6px 8px',background:'rgba(0,0,0,.6)',borderRadius:99,backdropFilter:'blur(8px)'}}>
          <div style={{width:20,height:20,borderRadius:99,background:detected.length>0?'#22c55e':'rgba(255,255,255,.15)',color:'#000',fontSize:11,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}} className="tn">{detected.length}</div>
          <span style={{fontSize:11,color:'#fff',fontWeight:700,letterSpacing:.3}}>scanné{detected.length>1?'s':''}</span>
          {counts.attention > 0 && (
            <>
              <span style={{width:1,height:12,background:'rgba(255,255,255,.2)'}} />
              <Dot c="#ef4444" s={6} />
              <span style={{fontSize:11,color:'#fca5a5',fontWeight:700}} className="tn">{counts.attention}</span>
            </>
          )}
        </div>

        {/* Haptic toggle */}
        <button onClick={()=>setHaptic(h=>!h)} style={{position:'absolute',top:14,right:96,width:38,height:38,borderRadius:99,background:'rgba(0,0,0,.6)',border:'none',color:haptic?'#fb923c':'rgba(255,255,255,.4)',padding:0,display:'flex',alignItems:'center',justifyContent:'center'}} title={haptic?'Vibreur on':'Vibreur off'}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            {haptic ? <><path d="M12 6v12"/><path d="M8 9v6"/><path d="M16 9v6"/><path d="M4 11v2"/><path d="M20 11v2"/></> : <><path d="M12 6v12"/><path d="M3 3l18 18"/></>}
          </svg>
        </button>

        {/* mode chip */}
        <div style={{position:'absolute',top:14,right:14,padding:'6px 10px',background: continu ? 'rgba(96,165,250,.9)' : 'rgba(251,146,60,.9)',color: continu ? '#fff' : '#1a0e05',borderRadius:99,fontSize:10,fontWeight:800,letterSpacing:.5}}>{continu ? 'CONTINU' : 'DIRECT'}</div>

        {/* Dup notice */}
        {unreadable && (
          <div className="pop" style={{position:'absolute',top:60,left:'50%',transform:'translateX(-50%)',padding:'8px 14px',background:'rgba(239,68,68,.95)',color:'#fff',borderRadius:99,fontSize:11,fontWeight:800,whiteSpace:'nowrap'}}>⚠ Code illisible · rapproche-toi</div>
        )}
        {dupNotice && (
          <div className="pop" style={{position:'absolute',top:60,left:'50%',transform:'translateX(-50%)',padding:'8px 14px',background:'rgba(251,191,36,.95)',color:'#1a0e05',borderRadius:99,fontSize:11,fontWeight:800,whiteSpace:'nowrap'}}>↻ Déjà scanné · {dupNotice.code}</div>
        )}

        {/* hint */}
        <div style={{position:'absolute',bottom:24,left:0,right:0,textAlign:'center',color:'rgba(255,255,255,.7)',fontSize:12,fontWeight:500,padding:'0 20px'}}>
          {detected.length === 0 ? 'Pointez le code-barre dans le cadre...' : (continu ? 'Continue · ou tape ↑ pour traiter' : '1 scan effectué')}
        </div>
      </div>

      {/* Bottom sheet of detected codes */}
      <div className="sheet" style={{background:T.bg,borderRadius:'20px 20px 0 0',maxHeight:batchOpen?'70%':'48%',transition:'max-height .25s ease',overflow:'auto',paddingBottom:'max(18px, env(safe-area-inset-bottom))'}}>

        </div>
        {detected.length === 0 ? (
          <div style={{padding:'14px 18px 12px',color:T.t2,fontSize:12,textAlign:'center'}}>

            </div>
            {detected.map(d => {
              const v = VC[d.verdict];
              return (
                <button key={d.code} onClick={()=>onPick(d.code)} className="pop" style={{

                  )}

                  </div>

            })}
            {detected.length >= 2 && (
              <button onClick={()=> onBatch ? onBatch(detected) : onPick(detected[0].code)} style={{
                width:'100%',marginTop:6,marginBottom:8,padding:'13px',borderRadius:12,border:'none',
                background:T.accent,color:'#1a0e05',fontSize:13,fontWeight:800,letterSpacing:.3,

              }}>
                Traiter les {detected.length} articles
                <Ico d={ICONS.fwd} s={14} sw={3} />
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function DouchetteScreen({ onBack, onArticle }) {
  const [last, setLast] = useState(null); // article scanned
  const [history, setHistory] = useState([]); // [{code, ts}]
  const [buf, setBuf] = useState('');
  const inputRef = useRef(null);
  const lastKeyRef = useRef(0);

  // Refocus hidden input aggressively (Zebra scanner sends keystrokes)
  useEffect(() => {
    const f = () => inputRef.current?.focus();
    f();
    const id = setInterval(f, 600);
    document.addEventListener('click', f);
    return () => { clearInterval(id); document.removeEventListener('click', f); };
  }, []);

  const onChange = (e) => {
    const v = e.target.value;
    setBuf(v);
    lastKeyRef.current = Date.now();
  };
  const onKey = (e) => {
    if (e.key === 'Enter' && buf.trim()) {
      const code = buf.trim().replace(/\D/g,'');
      const a = ARTICLES.find(x=>x.code===code) || ARTICLES[Math.floor(Math.random()*ARTICLES.length)]; // fallback demo
      setLast({...a, ts:Date.now()});
      setHistory(h => [{code:a.code, lib:a.lib, ts:Date.now()}, ...h].slice(0,8));
      setBuf('');
    }
  };

  // Demo trigger button (since users don't have a real Zebra)
  const fakeScan = (code) => {
    const a = ARTICLES.find(x=>x.code===code); if (!a) return;
    setLast({...a, ts:Date.now()});
    setHistory(h => [{code:a.code, lib:a.lib, ts:Date.now()}, ...h].slice(0,8));
  };

  return (
    <>
      <TopBar title="Mode douchette" sub="Scanner Zebra · clavier masqué" back onBack={onBack} onMenu={()=>{}} />
      {/* Hidden input absorbs scanner keystrokes */}
      <input
        ref={inputRef}
        value={buf}
        onChange={onChange}
        onKeyDown={onKey}
        autoFocus
        inputMode="none"
        readOnly={false}
        style={{position:'absolute',opacity:0,pointerEvents:'none',width:1,height:1,top:0,left:0}}
      />
      <div style={{flex:1,padding:'14px 16px',overflow:'auto',display:'flex',flexDirection:'column'}}>
        {!last ? (
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'30px 20px'}}>
            <div style={{width:88,height:88,borderRadius:99,background:'rgba(167,139,250,.12)',display:'flex',alignItems:'center',justifyContent:'center',color:'#a78bfa',marginBottom:14}}>
              <Ico d={ICONS.scan} s={42} sw={2} />
            </div>
            <div style={{fontSize:16,fontWeight:800,color:T.t1}}>En attente de scan</div>
            <div style={{fontSize:12,color:T.t2,marginTop:6,maxWidth:240,lineHeight:1.5}}>Pointe la douchette Zebra et appuie sur la gâchette. Le clavier ne s'affichera pas.</div>
            <div style={{marginTop:18,display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center'}}>
              {[ARTICLES[0],ARTICLES[1],ARTICLES[2]].map(x=>(
                <button key={x.code} onClick={()=>fakeScan(x.code)} style={{padding:'6px 10px',borderRadius:99,background:'rgba(255,255,255,.04)',border:`1px solid ${T.border}`,color:T.t2,fontSize:11,fontWeight:600}} className="tn">simuler {x.code}</button>
              ))}
            </div>
          </div>
        ) : (
          <button onClick={()=>onArticle(last.code)} key={last.ts} className="pop" style={{
            background:T.card,borderRadius:18,border:`1px solid ${T.border}`,
            borderLeft:`4px solid ${VC[last.verdict].edge}`,
            padding:'16px 18px',color:T.t1,textAlign:'left',cursor:'pointer',
          }}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:T.t3,fontWeight:700,letterSpacing:.6}} className="tn">{last.code}</span>
              <span style={{padding:'2px 8px',borderRadius:99,background:VC[last.verdict].bg,color:VC[last.verdict].fg,fontSize:10,fontWeight:800,letterSpacing:.5,textTransform:'uppercase'}}>{VC[last.verdict].label}</span>
              <span style={{marginLeft:'auto',fontSize:10,color:'#a78bfa',fontWeight:700}}>● SCANÉ</span>
            </div>
            <div style={{fontSize:18,fontWeight:800,marginTop:8,lineHeight:1.25}}>{last.lib}</div>
            <div style={{fontSize:12,color:T.t2,marginTop:3}}>{last.marque} · {last.fam}</div>
            <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
              <div style={{padding:'10px 12px',background:'#0a0c10',borderRadius:10}}>
                <div style={{fontSize:9,color:T.t3,textTransform:'uppercase',letterSpacing:.6,fontWeight:700}}>Stock</div>
                <div style={{fontSize:22,fontWeight:900,color:VC[last.verdict].fg,marginTop:2}} className="tn">{last.stock}</div>
                <div style={{fontSize:9,color:T.t3,marginTop:2}} className="tn">{last.min}/{last.max}</div>
              </div>
              <div style={{padding:'10px 12px',background:'#0a0c10',borderRadius:10}}>
                <div style={{fontSize:9,color:T.t3,textTransform:'uppercase',letterSpacing:.6,fontWeight:700}}>Empl.</div>
                <div style={{fontSize:14,fontWeight:800,color:T.accent,marginTop:4}}>{last.empl}</div>
              </div>
              <div style={{padding:'10px 12px',background:'#0a0c10',borderRadius:10}}>
                <div style={{fontSize:9,color:T.t3,textTransform:'uppercase',letterSpacing:.6,fontWeight:700}}>Couv.</div>
                <div style={{fontSize:14,fontWeight:800,color:T.t1,marginTop:4}} className="tn">{last.couv}j</div>
              </div>
            </div>
            <div style={{marginTop:10,fontSize:11,color:T.t3,textAlign:'right'}}>Tape pour la fiche complète →</div>
          </button>
        )}

        {history.length > 0 && (
          <div style={{marginTop:14}}>
            <div style={sectionLabel}>Derniers scans</div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {history.slice(1).map((h,i)=>(
                <button key={h.ts+'-'+i} onClick={()=>onArticle(h.code)} style={{
                  display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
                  background:'rgba(255,255,255,.02)',borderRadius:8,border:'none',
                  color:T.t2,textAlign:'left',
                }}>
                  <span style={{fontSize:11,color:T.t3,fontWeight:600,minWidth:50}} className="tn">{h.code}</span>
                  <span style={{flex:1,fontSize:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{h.lib}</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </>
  );
}

function EanSheet({ onClose, onPick }) {
  const [flip, setFlip] = useState(0);
  const entries = [..._customEanMap.entries()];
  const exportCsv = () => {
    if (entries.length === 0) return;
    let csv = 'EAN;Code Article;Libelle\n';
    for (const [ean, code] of entries) {
      const a = ARTICLES.find(x => x.code === code);
      csv += `${ean};${code};${(a?.lib || '').replace(/;/g, ',')}\n`;
    }
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url; link.download = 'associations-ean.csv'; link.click();
    URL.revokeObjectURL(url);
  };
  return (
    <Sheet onClose={onClose} title={`Associations EAN (${entries.length})`}>
      <div style={{padding:'4px 14px 0'}}>
        {entries.length === 0 ? (
          <div style={{padding:'20px',color:T.t2,fontSize:12,textAlign:'center'}}>Aucune association enregistree</div>
        ) : (
          <>
            <div style={{maxHeight:'50vh',overflowY:'auto'}}>
              {entries.map(([ean, code]) => {
                const a = ARTICLES.find(x => x.code === code);
                return (
                  <div key={ean} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:T.card,borderRadius:10,border:`1px solid ${T.border}`,marginBottom:4}}>
                    <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>onPick(code)}>
                      <div style={{fontSize:12,fontWeight:700,color:T.accent,fontFamily:'ui-monospace,monospace'}} className="tn">{ean}</div>
                      <div style={{fontSize:11,color:T.t3,marginTop:1}} className="tn">{code} <span style={{color:T.t2,fontFamily:'inherit'}}>{a?.lib || '?'}</span></div>
                    </div>
                    <button onClick={()=>{ removeCustomEan(ean); setFlip(f=>f+1); }} style={{background:'none',border:'none',color:'#fca5a5',fontSize:16,fontWeight:800,padding:'4px 8px',cursor:'pointer'}}>x</button>
                  </div>
                );
              })}
            </div>
            <button onClick={exportCsv} style={{width:'100%',marginTop:8,padding:'12px',borderRadius:12,border:`1px solid ${T.border}`,background:'rgba(255,255,255,.03)',color:T.t1,fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              Exporter CSV
              <Ico d={ICONS.fwd} s={14} sw={2.5} />

function JournalSheet({ onClose, actions, onPick, onUndo, onValidate, onPush, onPurge }) {
  const all = [];
  Object.keys(actions).forEach(c => actions[c].forEach(x => all.push({...x, code:c})));
  // Trier par emplacement croissant
  all.sort((a,b) => {
    const ea = ARTICLES.find(x=>x.code===a.code)?.empl || 'ZZZ';
    const eb = ARTICLES.find(x=>x.code===b.code)?.empl || 'ZZZ';
    return ea.localeCompare(eb);
  });
  const pending = all.filter(x=>x.status==='pending');
  const validated = all.filter(x=>x.status==='validee');

  const Row = ({ x }) => {
    const a = ARTICLES.find(y=>y.code===x.code);
    const v = a ? VC[a.verdict] : null;
    const sty = x.status==='validee'
      ? { dot:'#22c55e', bg:'rgba(34,197,94,.08)', border:'rgba(34,197,94,.25)' }
      : { dot:'#fbbf24', bg:'rgba(251,191,36,.08)', border:'rgba(251,191,36,.3)' };
    return (
      <div style={{padding:'10px 12px',background:sty.bg,borderRadius:12,border:`1px solid ${sty.border}`,borderLeft: v ? `3px solid ${v.edge}` : undefined,marginBottom:6}}>
        <button onClick={()=>onPick(x.code)} style={{display:'block',width:'100%',background:'transparent',border:'none',color:T.t1,textAlign:'left',padding:0,cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:15,fontWeight:900,color:T.t1,fontFamily:'ui-monospace,monospace'}} className="tn">{x.code}</span>
            <span style={{fontSize:11,color:T.accent,fontWeight:700}}>{a?.empl || '—'}</span>
            {v && <span style={{padding:'1px 5px',borderRadius:99,background:v.bg,color:v.fg,fontSize:8,fontWeight:800,textTransform:'uppercase',marginLeft:'auto'}}>{v.label}</span>}
          </div>
          <div style={{fontSize:13,fontWeight:700,marginTop:2}}>{x.label}</div>
          {a && <div style={{fontSize:11,color:T.t2,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>}
        </button>
        {x.status==='pending' && (
          <div style={{marginTop:6,paddingTop:6,borderTop:'1px solid rgba(255,255,255,.05)',display:'flex',justifyContent:'flex-end',gap:6}}>
            <button onClick={()=>onValidate(x.code, x.id)} style={{padding:'5px 10px',borderRadius:8,border:'1px solid rgba(34,197,94,.25)',background:'rgba(34,197,94,.08)',color:'#86efac',fontSize:11,fontWeight:800}}>Fait</button>
            <button onClick={()=>onUndo(x.code, x.id)} style={{padding:'5px 10px',borderRadius:8,border:'1px solid rgba(255,255,255,.12)',background:'transparent',color:T.t2,fontSize:11,fontWeight:700}}>Annuler</button>
          </div>
        )}
      </div>
    );
  };
  const Section = ({ title, items, color }) => items.length === 0 ? null : (
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10,color:color,fontWeight:800,letterSpacing:.8,textTransform:'uppercase',padding:'4px 4px 8px',display:'flex',alignItems:'center',gap:6}}>
        <span>{title}</span><span style={{color:T.t3,fontWeight:600}}>· {items.length}</span>
      </div>
      {items.map(x => <Row key={x.id} x={x} />)}
    </div>
  );
  return (
    <Sheet onClose={onClose} title="Journal du jour">
      <div style={{padding:'4px 14px 0'}}>
        {all.length === 0 ? (
          <div style={{textAlign:'center',padding:'30px 20px',color:T.t2}}>
            <div style={{fontSize:13}}>Rien aujourd'hui</div>
            <div style={{fontSize:11,color:T.t3,marginTop:6}}>Scanne un article pour commencer</div>
          </div>

          <>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:6,marginBottom:12}}>
              <div style={{padding:'8px 10px',background:'rgba(251,191,36,.08)',borderRadius:10,border:'1px solid rgba(251,191,36,.3)'}}>
                <div style={{fontSize:18,fontWeight:900,color:'#fbbf24'}} className="tn">{pending.length}</div>
                <div style={{fontSize:9,color:T.t2,marginTop:1}}>en attente</div>
              </div>
              <div style={{padding:'8px 10px',background:'rgba(34,197,94,.08)',borderRadius:10,border:'1px solid rgba(34,197,94,.25)'}}>
                <div style={{fontSize:18,fontWeight:900,color:'#86efac'}} className="tn">{validated.length}</div>
                <div style={{fontSize:9,color:T.t2,marginTop:1}}>validees</div>
              </div>
            </div>
            <Section title="En attente" items={pending} color="#fbbf24" />
            <Section title="Validees" items={validated} color="#86efac" />

// ── StockEditSheet — saisie compté physique ───────────────────
function StockEditSheet({ code, onClose, onConfirm }) {
  const a = ARTICLES.find(x=>x.code===code);
  const [val, setVal] = useState(String(a ? a.stock : ''));
  if (!a) return null;
  const n = parseInt(val,10);
  const valid = !isNaN(n) && n >= 0;
  const delta = valid ? n - a.stock : 0;
  const tap = (k) => {
    if (k === 'del') setVal(v => v.length <= 1 ? '0' : v.slice(0,-1));
    else if (k === 'c') setVal('0');
    else setVal(v => v === '0' ? k : (v + k).slice(0,4));
  };
  const keys = ['1','2','3','4','5','6','7','8','9','c','0','del'];
  return (
    <Sheet onClose={onClose} title="Modifier le stock">
      <div style={{padding:'4px 14px 0'}}>
        <div style={{fontSize:11,color:T.t3,padding:'0 4px 10px'}} className="tn">{a.code} · {a.lib}</div>
        <div style={{padding:'18px 16px',background:'rgba(255,255,255,.03)',borderRadius:14,border:`1px solid ${T.border}`,marginBottom:12,textAlign:'center'}}>
          <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>ERP actuel</div>
          <div style={{fontSize:18,color:T.t2,fontWeight:700,marginTop:2,marginBottom:14}} className="tn">{a.stock} pcs</div>
          <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Nouveau stock</div>
          <div style={{fontSize:48,fontWeight:900,color:T.t1,lineHeight:1,marginTop:6}} className="tn">{val}</div>
          <div style={{fontSize:11,color: delta === 0 ? T.t3 : (delta > 0 ? '#86efac' : '#fca5a5'),marginTop:6,fontWeight:700}} className="tn">
            {delta === 0 ? '— aucun écart —' : (delta > 0 ? `+${delta} pcs` : `${delta} pcs`)}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:10}}>
          {keys.map(k => (
            <button key={k} onClick={()=>tap(k)} style={{
              padding:'14px 0',borderRadius:11,border:`1px solid ${T.border}`,
              background: k==='c' || k==='del' ? 'rgba(255,255,255,.02)' : T.card,
              color: k==='c' || k==='del' ? T.t2 : T.t1,
              fontSize:18,fontWeight:800,
            }} className="tn">{k === 'del' ? '⌫' : k === 'c' ? 'C' : k}</button>
          ))}
        </div>
        <button disabled={!valid} onClick={()=>{ onConfirm(n); }} style={{
          width:'100%',padding:'14px',borderRadius:12,border:'none',
          background: valid ? '#fff' : 'rgba(255,255,255,.08)',
          color: valid ? '#000' : T.t3,
          fontSize:14,fontWeight:800,letterSpacing:.3,
        }}>Valider · {valid ? n : '—'} pcs</button>
      </div>
    </Sheet>
  );
}

// ── ConfirmSheet (post-action enrichi) ────────────────────────

  const [count, setCount] = useState(10);

    if (count <= 0) return;
    const t = setTimeout(() => setCount(c => c-1), 1000);
    return () => clearTimeout(t);
  }, [count]);
  const a = ARTICLES.find(x=>x.code===info.code);
  return (
    <Sheet onClose={onClose} title="Action enregistrée">
      <div style={{padding:'4px 14px 0'}}>
        <div style={{textAlign:'center',padding:'14px 0 18px'}}>

            <Ico d={ICONS.check} s={32} sw={3} />
          </div>
          <div style={{fontSize:15,fontWeight:800,color:T.t1,marginTop:12}}>{info.label}</div>
          {a && <div style={{fontSize:11,color:T.t3,marginTop:2}} className="tn">{info.code} · {a.lib}</div>}
        </div>

            background:'rgba(251,191,36,.08)',color:'#fbbf24',fontSize:13,fontWeight:800,
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:8,
          }}>

          background:'transparent',color:T.t2,fontSize:12,fontWeight:600,
        }}>Rester sur la fiche</button>

    </Sheet>
  );
}

// ── Inventaire — liste de zone ────────────────────────────────

    const a = ARTICLES.find(x=>x.code===c); if (!a) return null;
    const n = counts[c];
    const counted = n != null;
    const ecart = counted ? n - a.stock : null;
    return { a, n, counted, ecart };
  }).filter(Boolean);
  const done = items.filter(i=>i.counted).length;
  const ecarts = items.filter(i=>i.counted && i.ecart !== 0).length;
  const remaining = items.length - done;
  const pct = (done/items.length)*100;
  return (
    <>
      <div style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:10,background:'#16301f',borderBottom:`1px solid ${T.border}`,minHeight:52}}>

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'baseline',gap:6}}>
            <span style={{fontSize:9,color:'#86efac',fontWeight:800,letterSpacing:.6,textTransform:'uppercase'}}>Inventaire</span>
            <span style={{fontSize:14,fontWeight:800,color:T.t1}}>Zone {zone}</span>
          </div>
          <div style={{fontSize:10,color:T.t2,marginTop:2}} className="tn">{done}/{items.length} comptés · {ecarts} écart{ecarts>1?'s':''}</div>
        </div>
        <button onClick={onExit} style={{padding:'6px 10px',borderRadius:8,border:'1px solid rgba(255,255,255,.1)',background:'transparent',color:'#fca5a5',fontSize:11,fontWeight:700}}>Sortir</button>

        <div style={{height:6,background:'rgba(0,0,0,.5)',borderRadius:99}}>
          <div style={{height:'100%',width:pct+'%',background:'#22c55e',borderRadius:99,transition:'width .3s'}} />
        </div>
      </div>

      <div style={{flex:1,padding:'12px 14px',overflow:'auto'}}>
        <div style={sectionLabel}>À compter ({remaining})</div>
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
          {items.filter(i=>!i.counted).map(({a}) => (
            <button key={a.code} onClick={()=>onPick(a.code)} style={invRow(T.card, T.border)}>
              <div style={{width:32,height:32,borderRadius:9,background:'rgba(255,255,255,.04)',color:T.t3,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,fontWeight:800}}>○</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{a.code} · {a.empl}</div>
                <div style={{fontSize:13,fontWeight:600,color:T.t1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:T.t3}}>ERP</div>
                <div style={{fontSize:16,fontWeight:800,color:T.t2}} className="tn">{a.stock}</div>
              </div>
            </button>
          ))}
          {remaining === 0 && <div style={{padding:'20px',textAlign:'center',color:T.t3,fontSize:12}}>✓ Toute la zone est comptée</div>}
        </div>

        {done > 0 && (
          <>
            <div style={sectionLabel}>Comptés ({done})</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,paddingBottom:90}}>
              {items.filter(i=>i.counted).map(({a, n, ecart}) => {
                const ok = ecart === 0;
                const c = ok ? '#22c55e' : '#fbbf24';
                return (
                  <button key={a.code} onClick={()=>onPick(a.code)} style={invRow(ok?'rgba(34,197,94,.06)':'rgba(251,191,36,.08)', ok?'rgba(34,197,94,.2)':'rgba(251,191,36,.3)')}>
                    <div style={{width:32,height:32,borderRadius:9,background:c+'22',color:c,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16,fontWeight:900}}>{ok?'✓':'⚠'}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{a.code} · {a.empl}</div>
                      <div style={{fontSize:13,fontWeight:600,color:T.t1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>

                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:10,color:T.t3}} className="tn">ERP {a.stock}</div>

const invRow = (bg, border) => ({

// ── Inventaire — bilan ────────────────────────────────────────
function InvSummaryScreen({ zone, codes, counts, extras={}, onBack, onPush, onPick, onValidExtras }) {
  // Tri croissant par code, comme dans scan.js
  const sortedCodes = [...codes].sort((a,b)=>a.localeCompare(b));
  const expected = sortedCodes.map(c => ARTICLES.find(x=>x.code===c)).filter(Boolean);
  const scanned = expected.filter(a => counts[a.code] != null).map(a => ({ a, n: counts[a.code], ecart: counts[a.code] - a.stock }));
  const nonScanned = expected.filter(a => counts[a.code] == null);
  const corrections = scanned.filter(i=>i.ecart !== 0);
  const corrected = scanned.filter(i=>i.ecart === 0);
  const items = scanned;
  const valDelta = corrections.reduce((s,i)=>s + i.ecart * i.a.prix, 0);
  const extrasList = Object.keys(extras).map(c => {
    const a = ARTICLES.find(x=>x.code===c); if (!a) return null;
    return { a, n: extras[c] };
  }).filter(Boolean).sort((x,y)=>x.a.code.localeCompare(y.a.code));
  return (
    <>
      <TopBar title="Bilan inventaire" sub={`Zone ${zone} · ${items.length} article${items.length>1?'s':''} comptés`} back onBack={onBack} onMenu={()=>{}} />
      <div style={{flex:1,overflow:'auto',padding:'12px 14px 100px'}}>

        <div className="pop" style={{padding:'14px 16px',background:T.card,borderRadius:16,border:`1px solid ${T.border}`,marginBottom:14}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
            <div>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Vérifiés</div>
              <div style={{fontSize:22,fontWeight:900,color:'#86efac',marginTop:2}} className="tn">{items.length}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>/ {codes.length}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Non vér.</div>
              <div style={{fontSize:22,fontWeight:900,color:'#fca5a5',marginTop:2}} className="tn">{nonScanned.length}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>absents</div>
            </div>
            <div>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Écarts</div>
              <div style={{fontSize:22,fontWeight:900,color:'#fbbf24',marginTop:2}} className="tn">{corrections.length}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}} className="tn">{valDelta>=0?'+':''}{valDelta.toFixed(0)}€</div>
            </div>
            <div>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Attendus</div>
              <div style={{fontSize:22,fontWeight:900,color:T.t1,marginTop:2}} className="tn">{codes.length}</div>
              <div style={{fontSize:9,color:T.t3,marginTop:1}}>ERP</div>
            </div>
          </div>
        </div>

        {extrasList.length > 0 && (
          <>
            <div style={{...sectionLabel, color:'#fbbf24', display:'flex', alignItems:'center', gap:8}}>
              <span style={{flex:1}}>📍 Hors emplacement — ERP dit ailleurs ({extrasList.length})</span>
              <button onClick={onValidExtras} style={{padding:'4px 10px',borderRadius:6,border:'none',background:'#22c55e',color:'#06200f',fontSize:10,fontWeight:800,cursor:'pointer'}}>Tous vérifiés ✓</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:14}}>
              {extrasList.map(({a, n}) => (
                <button key={a.code} onClick={()=>onPick(a.code)} style={{
                  display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                  background:'rgba(251,191,36,.06)',borderRadius:10,
                  border:'1px solid rgba(251,191,36,.3)',color:T.t1,textAlign:'left',width:'100%',
                }}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:800,letterSpacing:.5}} className="tn">{a.code}</div>
                    <div style={{fontSize:11,color:T.t3,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0,fontSize:11,color:'#fbbf24'}}>ERP : {a.empl||'—'}</div>
                </button>
              ))}
            </div>
          </>
        )}

        {nonScanned.length > 0 && (
          <>
            <div style={{...sectionLabel, color:'#fca5a5'}}>⚠ Non vérifiés — à contrôler en priorité ({nonScanned.length})</div>
            <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:14}}>
              {nonScanned.map(a => (
                <button key={a.code} onClick={()=>onPick(a.code)} style={{
                  display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                  background:'rgba(248,113,113,.06)',borderRadius:10,
                  border:'1px solid rgba(248,113,113,.3)',color:T.t1,textAlign:'left',width:'100%',
                }}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:800,letterSpacing:.5}} className="tn">{a.code}</div>
                    <div style={{fontSize:11,color:T.t3,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontSize:13,fontWeight:700}} className="tn">ERP {a.stock}</div>
                    <div style={{fontSize:10,color:'#fca5a5',marginTop:1,fontWeight:700}}>Non vérifié</div>
                  </div>
                </button>
              ))}
            </div>
          </>
        )}

        {corrections.length > 0 && (
          <>
            <div style={sectionLabel}>Corrections à pousser</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
              {corrections.map(({a, n, ecart}) => {
                const c = ecart > 0 ? '#86efac' : '#fca5a5';
                return (
                  <button key={a.code} onClick={()=>onPick(a.code)} style={{
                    display:'flex',alignItems:'center',gap:10,padding:'12px 14px',
                    background:'rgba(251,191,36,.06)',borderRadius:12,
                    border:'1px solid rgba(251,191,36,.25)',color:T.t1,textAlign:'left',width:'100%',
                  }}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{a.code} · {a.empl}</div>
                      <div style={{fontSize:13,fontWeight:700,color:T.t1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</div>
                      <div style={{fontSize:11,color:T.t2,marginTop:3}} className="tn">ERP {a.stock} → Compté <strong style={{color:T.t1}}>{n}</strong></div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{padding:'4px 10px',borderRadius:99,background:c+'22',color:c,fontSize:14,fontWeight:900}} className="tn">{ecart>0?'+':''}{ecart}</div>
                      <div style={{fontSize:10,color:T.t3,marginTop:3}} className="tn">{(ecart*a.prix).toFixed(2)} €</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </>
        )}

        {corrected.length > 0 && (
          <>
            <div style={sectionLabel}>Conformes ({corrected.length})</div>
            <div style={{display:'flex',flexDirection:'column',gap:4,opacity:.6}}>
              {corrected.map(({a, n}) => (
                <div key={a.code} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'rgba(34,197,94,.04)',borderRadius:10,border:'1px solid rgba(34,197,94,.15)'}}>
                  <span style={{color:'#86efac',fontSize:13}}>✓</span>
                  <span style={{fontSize:11,color:T.t3,fontWeight:600}} className="tn">{a.code}</span>
                  <span style={{fontSize:12,color:T.t2,flex:1,minWidth:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.lib}</span>
                  <span style={{fontSize:12,fontWeight:700,color:T.t1}} className="tn">{n}</span>
                </div>
              ))}
            </div>
          </>
        )}

        {corrections.length === 0 && (
          <div style={{textAlign:'center',padding:'24px 16px',color:T.t2,fontSize:13}}>
            Aucune correction à pousser · stock conforme
          </div>
        )}
      </div>

      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'10px 14px calc(14px + env(safe-area-inset-bottom))',background:T.bg,borderTop:`1px solid ${T.border}`}}>
        {corrections.length > 0 ? (
          <button onClick={onPush} style={{
            width:'100%',padding:'15px',borderRadius:14,border:'none',
            background:'#fbbf24',color:'#1a0e05',fontSize:14,fontWeight:900,letterSpacing:.3,
          }}>POUSSER {corrections.length} CORRECTION{corrections.length>1?'S':''} VERS ERP</button>
        ) : (
          <button onClick={onPush} style={{
            width:'100%',padding:'15px',borderRadius:14,border:'none',
            background:'#22c55e',color:'#06200f',fontSize:14,fontWeight:900,letterSpacing:.3,
          }}>CLÔTURER L'INVENTAIRE</button>
        )}
      </div>
    </>
  );
}

// ── Toast ─────────────────────────────────────────────────────
// ── EmplacementSheet (pick new location) ──────────────────────
function EmplacementSheet({ code, onClose, onPick }) {
  const a = ARTICLES.find(x=>x.code===code);
  const [val, setVal] = useState('');
  const [scanning, setScanning] = useState(false);
  const allEmpl = [...new Set(ARTICLES.map(x=>x.empl))];
  const allee = a.empl.split('-')[0];
  const nearby = allEmpl.filter(e => e !== a.empl && e.startsWith(allee));
  const others = allEmpl.filter(e => e !== a.empl && !e.startsWith(allee));
  const fakeScan = () => {
    setScanning(true);
    setTimeout(() => {
      const empls = [...new Set(ARTICLES.map(x=>x.empl).filter(Boolean))];
      const pick = empls[Math.floor(Math.random()*empls.length)] || 'B12-D1';
      setVal(pick); setScanning(false);
    }, 1100);
  };
  const isValid = val && val !== a.empl;
  return (
    <Sheet onClose={onClose} title="Modifier emplacement">
      <div style={{padding:'4px 14px 0'}}>
        <div style={{padding:'12px 14px',background:'rgba(255,255,255,.03)',borderRadius:12,border:`1px solid ${T.border}`,marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Actuel</div>
            <div style={{fontSize:20,fontWeight:800,color:T.t2,marginTop:2}} className="tn">{a.empl}</div>
          </div>
          <div style={{fontSize:22,color:T.t3,fontWeight:300}}>→</div>
          <div style={{flex:1,textAlign:'right'}}>
            <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:.6,textTransform:'uppercase'}}>Nouveau</div>
            <div style={{fontSize:20,fontWeight:800,color:isValid?'#fb923c':T.t3,marginTop:2}} className="tn">{val || '—'}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input value={val} onChange={e=>setVal(e.target.value.toUpperCase())} placeholder="Ex: B12-A2" style={{
            flex:1,padding:'12px 14px',background:'#0a0c10',border:`1px solid ${T.border}`,borderRadius:11,
            color:T.t1,fontSize:14,fontWeight:700,letterSpacing:.5,fontFamily:'inherit',outline:'none',
          }} className="tn" />
          <button onClick={fakeScan} style={{
            width:48,padding:0,borderRadius:11,border:`1px solid ${scanning?T.accent:T.border}`,
            background:scanning?'rgba(251,146,60,.15)':T.card,color:T.accent,display:'flex',alignItems:'center',justifyContent:'center',
          }} title="Scanner l'étiquette de rayon">
            <Ico d={ICONS.scan} s={20} sw={2.5} />
          </button>
        </div>

        <button onClick={()=>isValid && onPick(val)} disabled={!isValid} style={{
          width:'100%',padding:'14px',borderRadius:12,border:'none',
          background: !isValid ? 'rgba(255,255,255,.06)' : T.accent,
          color: !isValid ? T.t3 : '#1a0e05',
          fontSize:14,fontWeight:800,letterSpacing:.3,marginBottom:14,
        }}>{isValid ? `Déplacer · ${a.empl} → ${val}` : 'Saisir un emplacement'}</button>

        {nearby.length > 0 && (
          <>
            <div style={sectionLabel}>Allée {allee} · voisins</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
              {nearby.map(e => (
                <button key={e} onClick={()=>setVal(e)} style={emplChip(val===e)}>{e}</button>
              ))}
            </div>
          </>
        )}

        {others.length > 0 && (
          <>
            <div style={sectionLabel}>Autres allées</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
              {others.map(e => (
                <button key={e} onClick={()=>setVal(e)} style={emplChip(val===e)}>{e}</button>
              ))}
            </div>
          </>
        )}
      </div>
    </Sheet>
  );
}
const emplChip = (active) => ({
  padding:'7px 13px',borderRadius:99,
  border:active?'1px solid #fb923c':`1px solid ${T.border}`,
  background:active?'rgba(251,146,60,.15)':T.card,
  color:active?'#fb923c':T.t1,fontSize:12,fontWeight:700,letterSpacing:.3,fontFamily:'inherit',
});

function Toast({ msg }) {
  return (
    <div style={{position:'absolute',bottom:90,left:'50%',transform:'translateX(-50%)',padding:'10px 16px',background:'rgba(15,17,22,.95)',color:T.t1,fontSize:13,fontWeight:600,borderRadius:99,zIndex:200,border:`1px solid ${T.border}`,backdropFilter:'blur(12px)',animation:'pop .15s ease',whiteSpace:'nowrap'}}>
      {msg}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
